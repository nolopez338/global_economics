<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2026 General Calendar</title>
  <style>
    :root {
      --bg: #f7f8fb;
      --card: #ffffff;
      --border: #d9deea;
      --text: #1d2636;
      --muted: #8a94a8;
      --accent: #3e5ca8;
      --empty: #eef1f7;
      --highlight-academic-tests: #dff5df;
      --highlight-today: #dbe9ff;
      --highlight-today-strong: #2f6fd6;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 1rem;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    main {
      max-width: 1400px;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 1rem;
      font-size: clamp(1.4rem, 2.6vw, 2rem);
      text-align: center;
    }

    .filter-block {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem 1rem;
      align-items: flex-end;
      justify-content: center;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.75rem;
      margin-bottom: 0.75rem;
    }

    .filter-field {
      display: grid;
      gap: 0.35rem;
      min-width: 180px;
    }

    .filter-label {
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .filter-input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.45rem 0.55rem;
      font-size: 0.95rem;
      color: var(--text);
      background: #fff;
    }



    .legend-block {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.75rem;
      margin-bottom: 0.75rem;
    }

    .legend-title {
      margin: 0 0 0.45rem;
      font-size: 0.9rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .legend-list {
      margin: 0;
      padding: 0;
      list-style: none;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem 1rem;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      font-size: 0.9rem;
    }

    .legend-swatch {
      width: 0.95rem;
      height: 0.95rem;
      border-radius: 3px;
      border: 1px solid var(--border);
      flex-shrink: 0;
    }

    .legend-swatch-academic-tests,
    .day-cell.highlight-academic-tests {
      background: var(--highlight-academic-tests);
    }

    .legend-swatch-today {
      background: var(--highlight-today);
      border-color: var(--highlight-today-strong);
    }

    .day-cell.highlight-today {
      background: var(--highlight-today);
      border-color: var(--highlight-today-strong);
      box-shadow: inset 0 0 0 2px var(--highlight-today-strong);
    }

    .calendar-year {
      display: grid;
      gap: 1rem;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      align-items: start;
    }

    .month-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.75rem;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
    }

    .month-name {
      margin: 0 0 0.6rem;
      font-size: 1rem;
      text-align: center;
    }

    .weekday-row,
    .week-row {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 0.3rem;
    }

    .weekday-row {
      margin-bottom: 0.35rem;
    }

    .weekday {
      text-transform: lowercase;
      font-size: 0.75rem;
      color: var(--muted);
      text-align: center;
      font-weight: 600;
      padding: 0.2rem 0;
    }

    .month-grid {
      display: grid;
      gap: 0.3rem;
    }

    .day-cell {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      min-height: 2.6rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #fff;
      padding: 0.2rem;
      overflow: hidden;
    }

    .day-cell.empty {
      background: var(--empty);
      border-style: dashed;
      opacity: 0.8;
    }

    .day-cell.filtered {
      background: var(--empty);
      border-style: dashed;
      opacity: 0.5;
    }

    .day-number {
      position: absolute;
      top: 0.22rem;
      left: 0.3rem;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1;
    }

    .cycle-day {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      font-size: 0.88rem;
      color: var(--accent);
      font-weight: 700;
      padding-top: 0.45rem;
      letter-spacing: 0.01em;
      white-space: nowrap;
    }

    .cycle-day.missing {
      font-weight: 500;
      color: var(--muted);
      font-size: 0.85rem;
    }

    .notice {
      margin: 0.5rem 0 1rem;
      color: #b23a3a;
      text-align: center;
      font-size: 0.95rem;
    }

    @media (max-width: 560px) {
      .filter-field {
        min-width: 100%;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>2026 General Calendar</h1>
    <section class="filter-block" aria-label="Date range filter">
      <div class="filter-field">
        <label for="from-date" class="filter-label">From</label>
        <input id="from-date" class="filter-input" type="date" value="2026-01-01" min="2026-01-01" max="2026-12-31" />
      </div>
      <div class="filter-field">
        <label for="to-date" class="filter-label">To</label>
        <input id="to-date" class="filter-input" type="date" value="2026-12-31" min="2026-01-01" max="2026-12-31" />
      </div>
    </section>
    <section id="highlights-legend" class="legend-block" aria-label="Calendar highlights"></section>
    <p id="notice" class="notice" hidden></p>
    <section id="calendar-year" class="calendar-year" aria-label="Full year calendar"></section>
  </main>

  <script src="../js/year-calendar-data.js"></script>
  <script>
    (function initializeYearCalendar() {
      const container = document.getElementById("calendar-year");
      const notice = document.getElementById("notice");
      const fromDateInput = document.getElementById("from-date");
      const toDateInput = document.getElementById("to-date");
      const legendContainer = document.getElementById("highlights-legend");
      const DEFAULT_FROM_DATE = "2026-01-01";
      const DEFAULT_TO_DATE = "2026-12-31";
      const FROM_STORAGE_KEY = "generalCalendar.fromDate";
      const TO_STORAGE_KEY = "generalCalendar.toDate";
      const CALENDAR_YEAR = "2026";

      if (!container || !notice || !fromDateInput || !toDateInput || !legendContainer) return;

      function toIsoLocalDate(date) {
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, "0");
        const day = String(date.getDate()).padStart(2, "0");
        return `${year}-${month}-${day}`;
      }

      const todayIsoDate = toIsoLocalDate(new Date());
      const todayInCalendarYear = todayIsoDate.startsWith(`${CALENDAR_YEAR}-`);

      const highlightGroups = [
        {
          label: "Pruebas Academicas",
          cellClass: "highlight-academic-tests",
          legendSwatchClass: "legend-swatch-academic-tests",
          dates: [
            "2026-05-07",
            "2026-05-08",
            "2026-05-11",
            "2026-05-12",
            "2026-05-13",
            "2026-05-14",
            "2026-05-19",
            "2026-05-20",
            "2026-05-21",
            "2026-05-22",
          ],
        },
        {
          label: "Today",
          cellClass: "highlight-today",
          legendSwatchClass: "legend-swatch-today",
          dates: todayInCalendarYear ? [todayIsoDate] : [],
        },
      ];

      const highlightByDate = new Map();
      highlightGroups.forEach((group) => {
        group.dates.forEach((date) => {
          const list = highlightByDate.get(date) || [];
          list.push(group);
          highlightByDate.set(date, list);
        });
      });

      function renderLegend() {
        legendContainer.innerHTML = "";

        const title = document.createElement("h2");
        title.className = "legend-title";
        title.textContent = "Highlights";
        legendContainer.appendChild(title);

        const legendList = document.createElement("ul");
        legendList.className = "legend-list";

        highlightGroups.forEach((group) => {
          const item = document.createElement("li");
          item.className = "legend-item";

          const swatch = document.createElement("span");
          swatch.className = `legend-swatch ${group.legendSwatchClass}`;
          swatch.setAttribute("aria-hidden", "true");

          const label = document.createElement("span");
          label.textContent = group.label;

          item.appendChild(swatch);
          item.appendChild(label);
          legendList.appendChild(item);
        });

        legendContainer.appendChild(legendList);
      }

      if (
        typeof calendar2026 === "undefined" ||
        !calendar2026 ||
        !Array.isArray(calendar2026.months)
      ) {
        notice.hidden = false;
        notice.textContent = "Unable to load calendar2026 data.";
        return;
      }

      const weekdays = Array.isArray(calendar2026.weekdays)
        ? calendar2026.weekdays
        : ["su", "mo", "tu", "we", "th", "fr", "sa"];

      function isValidDateString(value) {
        if (typeof value !== "string" || !/^\d{4}-\d{2}-\d{2}$/.test(value)) return false;
        const parsed = new Date(`${value}T00:00:00Z`);
        return !Number.isNaN(parsed.getTime()) && parsed.toISOString().slice(0, 10) === value;
      }

      function normalizeStoredDate(value, fallback) {
        if (!isValidDateString(value)) return fallback;
        if (value < DEFAULT_FROM_DATE || value > DEFAULT_TO_DATE) return fallback;
        return value;
      }

      function restoreFilterState() {
        let storedFrom = null;
        let storedTo = null;

        try {
          storedFrom = localStorage.getItem(FROM_STORAGE_KEY);
          storedTo = localStorage.getItem(TO_STORAGE_KEY);
        } catch (error) {
          storedFrom = null;
          storedTo = null;
        }

        const normalizedFrom = normalizeStoredDate(storedFrom, DEFAULT_FROM_DATE);
        const normalizedTo = normalizeStoredDate(storedTo, DEFAULT_TO_DATE);
        const restoredRangeIsValid = normalizedFrom <= normalizedTo;

        fromDateInput.value = restoredRangeIsValid ? normalizedFrom : DEFAULT_FROM_DATE;
        toDateInput.value = restoredRangeIsValid ? normalizedTo : DEFAULT_TO_DATE;
      }

      function saveFilterState() {
        const { from, to, isValid } = getCurrentRange();
        if (!isValid) return;

        try {
          localStorage.setItem(FROM_STORAGE_KEY, from);
          localStorage.setItem(TO_STORAGE_KEY, to);
        } catch (error) {
          // Ignore storage failures and continue rendering.
        }
      }

      function getCurrentRange() {
        const from = normalizeStoredDate(fromDateInput.value, DEFAULT_FROM_DATE);
        const to = normalizeStoredDate(toDateInput.value, DEFAULT_TO_DATE);
        return { from, to, isValid: from <= to };
      }

      function isDateInRange(isoDate, range) {
        return range.isValid && isoDate >= range.from && isoDate <= range.to;
      }

      function weekHasVisibleDate(week, numericMonth, range) {
        if (!Array.isArray(week)) return false;

        return week.some((realDate) => {
          if (realDate === null || realDate === undefined) return false;
          const numericDay = String(realDate).padStart(2, "0");
          const isoDate = `${CALENDAR_YEAR}-${numericMonth}-${numericDay}`;
          return isDateInRange(isoDate, range);
        });
      }

      function getVisibleWeeks(monthWeeks, numericMonth, range) {
        return monthWeeks
          .map((week, weekIndex) => ({ week, weekIndex }))
          .filter(({ week }) => weekHasVisibleDate(week, numericMonth, range));
      }

      function monthHasVisibleWeek(visibleWeeks) {
        return Array.isArray(visibleWeeks) && visibleWeeks.length > 0;
      }

      function renderCalendar() {
        const range = getCurrentRange();
        container.innerHTML = "";

        if (!range.isValid) {
          notice.hidden = false;
          notice.textContent = "Invalid range: From date must be on or before To date.";
          return;
        } else {
          notice.hidden = true;
          notice.textContent = "";
        }

        calendar2026.months.forEach((month, monthIndex) => {
          const monthCard = document.createElement("article");
          monthCard.className = "month-card";

          const monthName = document.createElement("h2");
          monthName.className = "month-name";
          monthName.textContent = month?.name || `Month ${monthIndex + 1}`;
          monthCard.appendChild(monthName);

          const weekdayRow = document.createElement("div");
          weekdayRow.className = "weekday-row";
          weekdays.forEach((label) => {
            const weekday = document.createElement("div");
            weekday.className = "weekday";
            weekday.textContent = label;
            weekdayRow.appendChild(weekday);
          });
          monthCard.appendChild(weekdayRow);

          const monthGrid = document.createElement("div");
          monthGrid.className = "month-grid";

          const monthWeeks = Array.isArray(month?.weeks) ? month.weeks : [];
          const numericMonth = String(month?.month ?? monthIndex + 1).padStart(2, "0");
          const visibleWeeks = getVisibleWeeks(monthWeeks, numericMonth, range);

          if (!monthHasVisibleWeek(visibleWeeks)) {
            return;
          }

          visibleWeeks.forEach(({ week, weekIndex }) => {
            const weekRow = document.createElement("div");
            weekRow.className = "week-row";

            for (let dayIndex = 0; dayIndex < 7; dayIndex += 1) {
              const realDate = Array.isArray(week) ? week[dayIndex] : null;

              const dayCell = document.createElement("div");
              dayCell.className = "day-cell";

              if (realDate === null || realDate === undefined) {
                dayCell.classList.add("empty");
                dayCell.setAttribute("aria-hidden", "true");
              } else {
                const numericDay = String(realDate).padStart(2, "0");
                const isoDate = `${CALENDAR_YEAR}-${numericMonth}-${numericDay}`;
                const inRange = isDateInRange(isoDate, range);

                if (!inRange) {
                  dayCell.classList.add("filtered");
                  dayCell.setAttribute("aria-hidden", "true");
                } else {
                  const matchingHighlights = highlightByDate.get(isoDate) || [];
                  matchingHighlights.forEach((group) => {
                    dayCell.classList.add(group.cellClass);
                  });

                  const dayNumber = document.createElement("div");
                  dayNumber.className = "day-number";
                  dayNumber.textContent = String(realDate);

                  const cycleValue = document.createElement("div");
                  cycleValue.className = "cycle-day";
                  let cycleNumber = null;
                  let cycleDay = null;

                  try {
                    cycleNumber = getCycleNumber2026(monthIndex + 1, realDate);
                  } catch (error) {
                    cycleNumber = null;
                  }

                  try {
                    cycleDay = getCycleDay2026(monthIndex + 1, realDate);
                  } catch (error) {
                    cycleDay = null;
                  }

                  if (
                    cycleNumber === null ||
                    cycleNumber === undefined ||
                    cycleDay === null ||
                    cycleDay === undefined
                  ) {
                    cycleValue.classList.add("missing");
                    cycleValue.textContent = "–";
                  } else {
                    cycleValue.textContent = `${cycleNumber}-${cycleDay}`;
                  }

                  dayCell.appendChild(dayNumber);
                  dayCell.appendChild(cycleValue);
                }
              }

              weekRow.appendChild(dayCell);
            }

            monthGrid.appendChild(weekRow);
          });

          monthCard.appendChild(monthGrid);
          container.appendChild(monthCard);
        });
      }

      function handleFilterInput() {
        saveFilterState();
        renderCalendar();
      }

      fromDateInput.addEventListener("input", handleFilterInput);
      toDateInput.addEventListener("input", handleFilterInput);
      fromDateInput.addEventListener("change", handleFilterInput);
      toDateInput.addEventListener("change", handleFilterInput);

      renderLegend();
      restoreFilterState();
      renderCalendar();
    })();
  </script>
</body>
</html>
