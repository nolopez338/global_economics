<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2026 General Calendar</title>
  <style>
    :root {
      --bg: #f7f8fb;
      --card: #ffffff;
      --border: #d9deea;
      --text: #1d2636;
      --muted: #8a94a8;
      --accent: #3e5ca8;
      --empty: #eef1f7;
      --highlight-academic-tests: #dff5df;
      --highlight-individual-development: #bfe6bf;
      --highlight-today: #dbe9ff;
      --highlight-today-strong: #2f6fd6;
      --highlight-holy-week: #fff7bf;
      --highlight-holidays: #e0b52e;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 1rem;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    main {
      max-width: 1400px;
      margin: 0 auto;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.4rem, 2.6vw, 2rem);
      text-align: center;
    }

    .page-header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .header-button {
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      font-size: 0.9rem;
      font-weight: 600;
      line-height: 1.2;
      padding: 0.45rem 0.7rem;
      cursor: pointer;
      text-decoration: none;
      white-space: nowrap;
    }

    .header-button:hover {
      background: #f3f6fd;
    }

    .header-button:focus-visible {
      outline: none;
      box-shadow: 0 0 0 2px rgba(47, 111, 214, 0.35);
    }

    .filter-section {
      margin-top: 1.25rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.75rem;
    }

    .filter-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      margin-bottom: 0.65rem;
    }

    .filter-title {
      margin: 0;
      font-size: 0.9rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .filter-toggle {
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      font-size: 0.85rem;
      font-weight: 600;
      line-height: 1.2;
      padding: 0.4rem 0.6rem;
      cursor: pointer;
      white-space: nowrap;
    }

    .filter-toggle:hover {
      background: #f3f6fd;
    }

    .filter-toggle:focus-visible {
      outline: none;
      box-shadow: 0 0 0 2px rgba(47, 111, 214, 0.35);
    }

    .filter-content {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem 1rem;
      align-items: flex-end;
      justify-content: center;
    }

    .filter-section.is-collapsed .filter-content {
      display: none;
    }

    .filter-field {
      display: grid;
      gap: 0.35rem;
      min-width: 180px;
    }

    .filter-label {
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .filter-input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.45rem 0.55rem;
      font-size: 0.95rem;
      color: var(--text);
      background: #fff;
    }



    .legend-block {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.75rem;
      margin-bottom: 0.75rem;
    }

    .legend-title {
      margin: 0 0 0.45rem;
      font-size: 0.9rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .legend-list {
      margin: 0;
      padding: 0;
      list-style: none;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem 1rem;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      font-size: 0.9rem;
      padding: 0.2rem 0.35rem;
      border-radius: 6px;
      cursor: pointer;
      user-select: none;
      transition: background-color 0.18s ease, box-shadow 0.18s ease;
    }

    .legend-item:hover {
      background: #f3f6fd;
    }

    .legend-item:focus-visible {
      outline: none;
      box-shadow: 0 0 0 2px rgba(47, 111, 214, 0.4);
    }

    .legend-swatch {
      width: 0.95rem;
      height: 0.95rem;
      border-radius: 3px;
      border: 1px solid var(--border);
      flex-shrink: 0;
    }

    .legend-swatch-academic-tests,
    .day-cell.highlight-academic-tests {
      background: var(--highlight-academic-tests);
    }

    .legend-swatch-individual-development,
    .day-cell.highlight-individual-development {
      background: var(--highlight-individual-development);
    }

    .legend-swatch-holy-week,
    .day-cell.highlight-holy-week {
      background: var(--highlight-holy-week);
    }

    .legend-swatch-holidays,
    .day-cell.highlight-holidays {
      background: var(--highlight-holidays);
    }

    .legend-swatch-today {
      background: var(--highlight-today);
      border-color: var(--highlight-today-strong);
    }

    .day-cell.highlight-today {
      background: var(--highlight-today);
      border-color: var(--highlight-today-strong);
      box-shadow: inset 0 0 0 2px var(--highlight-today-strong);
    }

    .calendar-year {
      display: grid;
      gap: 1rem;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      align-items: start;
    }

    .month-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.75rem;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
    }

    .month-name {
      margin: 0 0 0.6rem;
      font-size: 1rem;
      text-align: center;
    }

    .weekday-row,
    .week-row {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 0.3rem;
    }

    .weekday-row {
      margin-bottom: 0.35rem;
    }

    .weekday {
      text-transform: lowercase;
      font-size: 0.75rem;
      color: var(--muted);
      text-align: center;
      font-weight: 600;
      padding: 0.2rem 0;
    }

    .month-grid {
      display: grid;
      gap: 0.3rem;
    }

    .day-cell {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      min-height: 2.6rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #fff;
      padding: 0.2rem;
      overflow: hidden;
    }

    .day-cell.empty {
      background: var(--empty);
      border-style: dashed;
      opacity: 0.8;
    }

    .day-cell.filtered {
      background: var(--empty);
      border-style: dashed;
      opacity: 0.5;
    }

    .day-number {
      position: absolute;
      top: 0.22rem;
      left: 0.3rem;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1;
    }

    .cycle-day {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      font-size: 0.88rem;
      color: var(--accent);
      font-weight: 700;
      padding-top: 0.45rem;
      letter-spacing: 0.01em;
      white-space: nowrap;
    }

    .cycle-day.missing {
      font-weight: 500;
      color: var(--muted);
      font-size: 0.85rem;
    }

    .notice {
      margin: 0.5rem 0 1rem;
      color: #b23a3a;
      text-align: center;
      font-size: 0.95rem;
    }

    @media (max-width: 560px) {
      .filter-field {
        min-width: 100%;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="page-header">
      <a id="week-view-link" class="header-button" href="/teacher/schedule.html">Week View</a>
      <h1>2026 General Calendar</h1>
    </div>
    <section id="highlights-legend" class="legend-block" aria-label="Calendar highlights"></section>
    <p id="notice" class="notice" hidden></p>
    <section id="calendar-year" class="calendar-year" aria-label="Full year calendar"></section>
    <section id="filter-section" class="filter-section" aria-label="Date range filter">
      <div class="filter-header">
        <h2 class="filter-title">Filters</h2>
        <button id="filter-toggle" class="filter-toggle" type="button" aria-controls="filter-content" aria-expanded="true">
          ↑
        </button>
      </div>
      <div id="filter-content" class="filter-content">
        <div class="filter-field">
          <label for="from-date" class="filter-label">From</label>
          <input id="from-date" class="filter-input" type="date" value="2026-01-01" min="2026-01-01" max="2026-12-31" />
        </div>
        <div class="filter-field">
          <label for="to-date" class="filter-label">To</label>
          <input id="to-date" class="filter-input" type="date" value="2026-12-31" min="2026-01-01" max="2026-12-31" />
        </div>
      </div>
    </section>
  </main>

  <script src="../js/year-calendar-data.js"></script>
  <script>
    (function initializeYearCalendar() {
      const container = document.getElementById("calendar-year");
      const notice = document.getElementById("notice");
      const fromDateInput = document.getElementById("from-date");
      const toDateInput = document.getElementById("to-date");
      const filterSection = document.getElementById("filter-section");
      const filterToggleButton = document.getElementById("filter-toggle");
      const legendContainer = document.getElementById("highlights-legend");
      const DEFAULT_FROM_DATE = "2026-01-01";
      const DEFAULT_TO_DATE = "2026-12-31";
      const FROM_STORAGE_KEY = "generalCalendar.fromDate";
      const TO_STORAGE_KEY = "generalCalendar.toDate";
      const FILTER_VISIBILITY_STORAGE_KEY = "generalCalendar.filtersCollapsed";
      const HIGHLIGHT_COLORS_STORAGE_KEY = "generalCalendar.highlightColors";
      const CALENDAR_YEAR = "2026";

      const weekViewLink = document.getElementById("week-view-link");
      const originQueryValue = new URLSearchParams(window.location.search).get("origin");
      const returnTargets = {
        "schedule": "../../schedule.html",
        "schedule-teacher": "../../schedule-teacher.html",
      };
      const fallbackReturnTarget = returnTargets.schedule;
      if (weekViewLink) {
        weekViewLink.setAttribute("href", returnTargets[originQueryValue] || fallbackReturnTarget);
      }

      if (!container || !notice || !fromDateInput || !toDateInput || !legendContainer || !filterSection || !filterToggleButton) return;

      function toIsoLocalDate(date) {
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, "0");
        const day = String(date.getDate()).padStart(2, "0");
        return `${year}-${month}-${day}`;
      }

      const todayIsoDate = toIsoLocalDate(new Date());
      const todayInCalendarYear = todayIsoDate.startsWith(`${CALENDAR_YEAR}-`);

      const highlightGroups = [
        {
          id: "academic-tests",
          label: "Pruebas Academicas",
          cellClass: "highlight-academic-tests",
          legendSwatchClass: "legend-swatch-academic-tests",
          colorVar: "--highlight-academic-tests",
          defaultColor: "#dff5df",
          entries: [
            { date: "2026-05-07" },
            { date: "2026-05-08" },
            { date: "2026-05-11" },
            { date: "2026-05-12" },
            { date: "2026-05-13" },
            { date: "2026-05-14" },
            { date: "2026-05-19" },
            { date: "2026-05-20" },
            { date: "2026-05-21" },
            { date: "2026-05-22" },
          ],
        },
        {
          id: "holy-week",
          label: "Holy Week",
          cellClass: "highlight-holy-week",
          legendSwatchClass: "legend-swatch-holy-week",
          colorVar: "--highlight-holy-week",
          defaultColor: "#fff7bf",
          entries: [
            { date: "2026-03-30" },
            { date: "2026-03-31" },
            { date: "2026-04-01" },
            { date: "2026-04-02" },
            { date: "2026-04-03" },
            { date: "2026-04-04" },
            { date: "2026-04-05" },
          ],
        },
        {
          id: "holidays",
          label: "Holidays",
          cellClass: "highlight-holidays",
          legendSwatchClass: "legend-swatch-holidays",
          colorVar: "--highlight-holidays",
          defaultColor: "#e0b52e",
          entries: Array.isArray(holidays2026) ? holidays2026 : [],
        },
        {
          id: "individual-development",
          label: "Individual development",
          cellClass: "highlight-individual-development",
          legendSwatchClass: "legend-swatch-individual-development",
          colorVar: "--highlight-individual-development",
          defaultColor: "#bfe6bf",
          entries: [
            { date: "2026-06-16" },
            { date: "2026-06-17" },
            { date: "2026-06-18" },
            { date: "2026-06-19" },
            { date: "2026-06-22" },
            { date: "2026-06-23" },
            { date: "2026-06-24" },
            { date: "2026-06-25" },
            { date: "2026-06-26" },
          ],
        },
        {
          id: "today",
          label: "Today",
          cellClass: "highlight-today",
          legendSwatchClass: "legend-swatch-today",
          colorVar: "--highlight-today",
          defaultColor: "#dbe9ff",
          entries: todayInCalendarYear ? [{ date: todayIsoDate }] : [],
        },
      ];

      function normalizeHexColor(value, fallback) {
        if (typeof value !== "string") return fallback;
        const trimmed = value.trim();
        const shortHex = /^#([a-fA-F0-9]{3})$/;
        const longHex = /^#([a-fA-F0-9]{6})$/;

        if (longHex.test(trimmed)) return trimmed.toLowerCase();
        if (shortHex.test(trimmed)) {
          const rgb = trimmed.slice(1).split("").map((char) => `${char}${char}`).join("");
          return `#${rgb}`.toLowerCase();
        }
        return fallback;
      }

      function clampRgb(value) {
        return Math.max(0, Math.min(255, Math.round(value)));
      }

      function darkenHexColor(colorHex, ratio) {
        const normalized = normalizeHexColor(colorHex, "#2f6fd6");
        const red = parseInt(normalized.slice(1, 3), 16);
        const green = parseInt(normalized.slice(3, 5), 16);
        const blue = parseInt(normalized.slice(5, 7), 16);

        const darkenedRed = clampRgb(red * (1 - ratio));
        const darkenedGreen = clampRgb(green * (1 - ratio));
        const darkenedBlue = clampRgb(blue * (1 - ratio));

        const toHex = (channel) => channel.toString(16).padStart(2, "0");
        return `#${toHex(darkenedRed)}${toHex(darkenedGreen)}${toHex(darkenedBlue)}`;
      }

      function applyHighlightColorsToCss() {
        highlightGroups.forEach((group) => {
          document.documentElement.style.setProperty(group.colorVar, group.currentColor);
        });

        const todayGroup = highlightGroups.find((group) => group.id === "today");
        if (todayGroup) {
          const todayStrongColor = darkenHexColor(todayGroup.currentColor, 0.28);
          document.documentElement.style.setProperty("--highlight-today-strong", todayStrongColor);
        }
      }

      function saveHighlightColors() {
        const serializableColors = {};
        highlightGroups.forEach((group) => {
          serializableColors[group.id] = group.currentColor;
        });

        try {
          localStorage.setItem(HIGHLIGHT_COLORS_STORAGE_KEY, JSON.stringify(serializableColors));
        } catch (error) {
          // Ignore storage failures and continue rendering.
        }
      }

      function restoreHighlightColors() {
        let parsedData = null;

        highlightGroups.forEach((group) => {
          group.currentColor = normalizeHexColor(group.defaultColor, group.defaultColor);
        });

        try {
          const rawData = localStorage.getItem(HIGHLIGHT_COLORS_STORAGE_KEY);
          if (!rawData) {
            applyHighlightColorsToCss();
            return;
          }

          const parsed = JSON.parse(rawData);
          if (parsed && typeof parsed === "object" && !Array.isArray(parsed)) {
            parsedData = parsed;
          }
        } catch (error) {
          parsedData = null;
        }

        if (parsedData) {
          highlightGroups.forEach((group) => {
            const candidateColor = parsedData[group.id];
            group.currentColor = normalizeHexColor(candidateColor, group.defaultColor);
          });
        }

        applyHighlightColorsToCss();
      }

      const highlightByDate = new Map();
      highlightGroups.forEach((group) => {
        group.entries.forEach((entry) => {
          if (!entry || typeof entry.date !== "string") return;

          const list = highlightByDate.get(entry.date) || [];
          list.push({
            group,
            name: typeof entry.name === "string" ? entry.name : "",
          });
          highlightByDate.set(entry.date, list);
        });
      });

      function renderLegend() {
        legendContainer.innerHTML = "";

        const title = document.createElement("h2");
        title.className = "legend-title";
        title.textContent = "Highlights";
        legendContainer.appendChild(title);

        const legendList = document.createElement("ul");
        legendList.className = "legend-list";

        highlightGroups.forEach((group) => {
          const item = document.createElement("li");
          item.className = "legend-item";
          item.setAttribute("role", "button");
          item.setAttribute("tabindex", "0");
          item.setAttribute("title", `Change color for ${group.label}`);

          const swatch = document.createElement("span");
          swatch.className = `legend-swatch ${group.legendSwatchClass}`;
          swatch.setAttribute("aria-hidden", "true");

          const label = document.createElement("span");
          label.textContent = group.label;

          item.appendChild(swatch);
          item.appendChild(label);

          const colorInput = document.createElement("input");
          colorInput.type = "color";
          colorInput.value = group.currentColor;
          colorInput.setAttribute("aria-label", `Pick color for ${group.label}`);
          colorInput.style.position = "absolute";
          colorInput.style.opacity = "0";
          colorInput.style.pointerEvents = "none";
          colorInput.style.width = "1px";
          colorInput.style.height = "1px";

          const openColorPicker = () => {
            colorInput.value = group.currentColor;
            colorInput.click();
          };

          item.addEventListener("click", openColorPicker);
          item.addEventListener("keydown", (event) => {
            if (event.key === "Enter" || event.key === " ") {
              event.preventDefault();
              openColorPicker();
            }
          });

          colorInput.addEventListener("input", (event) => {
            const nextColor = normalizeHexColor(event.target.value, group.currentColor);
            group.currentColor = nextColor;
            applyHighlightColorsToCss();
            saveHighlightColors();
          });

          item.appendChild(colorInput);
          legendList.appendChild(item);
        });

        legendContainer.appendChild(legendList);
      }

      if (
        typeof calendar2026 === "undefined" ||
        !calendar2026 ||
        !Array.isArray(calendar2026.months)
      ) {
        notice.hidden = false;
        notice.textContent = "Unable to load calendar2026 data.";
        return;
      }

      const weekdays = Array.isArray(calendar2026.weekdays)
        ? calendar2026.weekdays
        : ["su", "mo", "tu", "we", "th", "fr", "sa"];

      function isValidDateString(value) {
        if (typeof value !== "string" || !/^\d{4}-\d{2}-\d{2}$/.test(value)) return false;
        const parsed = new Date(`${value}T00:00:00Z`);
        return !Number.isNaN(parsed.getTime()) && parsed.toISOString().slice(0, 10) === value;
      }

      function normalizeStoredDate(value, fallback) {
        if (!isValidDateString(value)) return fallback;
        if (value < DEFAULT_FROM_DATE || value > DEFAULT_TO_DATE) return fallback;
        return value;
      }

      function restoreFilterState() {
        let storedFrom = null;
        let storedTo = null;

        try {
          storedFrom = localStorage.getItem(FROM_STORAGE_KEY);
          storedTo = localStorage.getItem(TO_STORAGE_KEY);
        } catch (error) {
          storedFrom = null;
          storedTo = null;
        }

        const normalizedFrom = normalizeStoredDate(storedFrom, DEFAULT_FROM_DATE);
        const normalizedTo = normalizeStoredDate(storedTo, DEFAULT_TO_DATE);
        const restoredRangeIsValid = normalizedFrom <= normalizedTo;

        fromDateInput.value = restoredRangeIsValid ? normalizedFrom : DEFAULT_FROM_DATE;
        toDateInput.value = restoredRangeIsValid ? normalizedTo : DEFAULT_TO_DATE;
      }

      function saveFilterState() {
        const { from, to, isValid } = getCurrentRange();
        if (!isValid) return;

        try {
          localStorage.setItem(FROM_STORAGE_KEY, from);
          localStorage.setItem(TO_STORAGE_KEY, to);
        } catch (error) {
          // Ignore storage failures and continue rendering.
        }
      }

      function getCurrentRange() {
        const from = normalizeStoredDate(fromDateInput.value, DEFAULT_FROM_DATE);
        const to = normalizeStoredDate(toDateInput.value, DEFAULT_TO_DATE);
        return { from, to, isValid: from <= to };
      }

      function isDateInRange(isoDate, range) {
        return range.isValid && isoDate >= range.from && isoDate <= range.to;
      }

      function weekHasVisibleDate(week, numericMonth, range) {
        if (!Array.isArray(week)) return false;

        return week.some((realDate) => {
          if (realDate === null || realDate === undefined) return false;
          const numericDay = String(realDate).padStart(2, "0");
          const isoDate = `${CALENDAR_YEAR}-${numericMonth}-${numericDay}`;
          return isDateInRange(isoDate, range);
        });
      }

      function getVisibleWeeks(monthWeeks, numericMonth, range) {
        return monthWeeks
          .map((week, weekIndex) => ({ week, weekIndex }))
          .filter(({ week }) => weekHasVisibleDate(week, numericMonth, range));
      }

      function monthHasVisibleWeek(visibleWeeks) {
        return Array.isArray(visibleWeeks) && visibleWeeks.length > 0;
      }

      function renderCalendar() {
        const range = getCurrentRange();
        container.innerHTML = "";

        if (!range.isValid) {
          notice.hidden = false;
          notice.textContent = "Invalid range: From date must be on or before To date.";
          return;
        } else {
          notice.hidden = true;
          notice.textContent = "";
        }

        calendar2026.months.forEach((month, monthIndex) => {
          const monthCard = document.createElement("article");
          monthCard.className = "month-card";

          const monthName = document.createElement("h2");
          monthName.className = "month-name";
          monthName.textContent = month?.name || `Month ${monthIndex + 1}`;
          monthCard.appendChild(monthName);

          const weekdayRow = document.createElement("div");
          weekdayRow.className = "weekday-row";
          weekdays.forEach((label) => {
            const weekday = document.createElement("div");
            weekday.className = "weekday";
            weekday.textContent = label;
            weekdayRow.appendChild(weekday);
          });
          monthCard.appendChild(weekdayRow);

          const monthGrid = document.createElement("div");
          monthGrid.className = "month-grid";

          const monthWeeks = Array.isArray(month?.weeks) ? month.weeks : [];
          const numericMonth = String(month?.month ?? monthIndex + 1).padStart(2, "0");
          const visibleWeeks = getVisibleWeeks(monthWeeks, numericMonth, range);

          if (!monthHasVisibleWeek(visibleWeeks)) {
            return;
          }

          visibleWeeks.forEach(({ week, weekIndex }) => {
            const weekRow = document.createElement("div");
            weekRow.className = "week-row";

            for (let dayIndex = 0; dayIndex < 7; dayIndex += 1) {
              const realDate = Array.isArray(week) ? week[dayIndex] : null;

              const dayCell = document.createElement("div");
              dayCell.className = "day-cell";

              if (realDate === null || realDate === undefined) {
                dayCell.classList.add("empty");
                dayCell.setAttribute("aria-hidden", "true");
              } else {
                const numericDay = String(realDate).padStart(2, "0");
                const isoDate = `${CALENDAR_YEAR}-${numericMonth}-${numericDay}`;
                const inRange = isDateInRange(isoDate, range);

                if (!inRange) {
                  dayCell.classList.add("filtered");
                  dayCell.setAttribute("aria-hidden", "true");
                } else {
                  const matchingHighlights = highlightByDate.get(isoDate) || [];
                  matchingHighlights.forEach(({ group }) => {
                    dayCell.classList.add(group.cellClass);
                  });

                  const holidayHighlight = matchingHighlights.find(
                    ({ group }) => group.label === "Holidays"
                  );
                  if (holidayHighlight && holidayHighlight.name) {
                    dayCell.title = holidayHighlight.name;
                  }

                  const dayNumber = document.createElement("div");
                  dayNumber.className = "day-number";
                  dayNumber.textContent = String(realDate);

                  const cycleValue = document.createElement("div");
                  cycleValue.className = "cycle-day";
                  let cycleNumber = null;
                  let cycleDay = null;

                  try {
                    cycleNumber = getCycleNumber2026(monthIndex + 1, realDate);
                  } catch (error) {
                    cycleNumber = null;
                  }

                  try {
                    cycleDay = getCycleDay2026(monthIndex + 1, realDate);
                  } catch (error) {
                    cycleDay = null;
                  }

                  if (
                    cycleNumber === null ||
                    cycleNumber === undefined ||
                    cycleDay === null ||
                    cycleDay === undefined
                  ) {
                    cycleValue.classList.add("missing");
                    cycleValue.textContent = "–";
                  } else {
                    cycleValue.textContent = `${cycleNumber}-${cycleDay}`;
                  }

                  dayCell.appendChild(dayNumber);
                  dayCell.appendChild(cycleValue);
                }
              }

              weekRow.appendChild(dayCell);
            }

            monthGrid.appendChild(weekRow);
          });

          monthCard.appendChild(monthGrid);
          container.appendChild(monthCard);
        });
      }

      function handleFilterInput() {
        saveFilterState();
        renderCalendar();
      }

      function setFiltersCollapsed(isCollapsed) {
        filterSection.classList.toggle("is-collapsed", isCollapsed);
        filterToggleButton.setAttribute("aria-expanded", isCollapsed ? "false" : "true");
        filterToggleButton.textContent = isCollapsed ? "↓" : "↑";
      }

      function restoreFilterVisibilityState() {
        let isCollapsed = false;

        try {
          isCollapsed = localStorage.getItem(FILTER_VISIBILITY_STORAGE_KEY) === "true";
        } catch (error) {
          isCollapsed = false;
        }

        setFiltersCollapsed(isCollapsed);
      }

      function saveFilterVisibilityState(isCollapsed) {
        try {
          localStorage.setItem(FILTER_VISIBILITY_STORAGE_KEY, String(isCollapsed));
        } catch (error) {
          // Ignore storage failures and continue rendering.
        }
      }

      fromDateInput.addEventListener("input", handleFilterInput);
      toDateInput.addEventListener("input", handleFilterInput);
      fromDateInput.addEventListener("change", handleFilterInput);
      toDateInput.addEventListener("change", handleFilterInput);
      filterToggleButton.addEventListener("click", () => {
        const shouldCollapse = !filterSection.classList.contains("is-collapsed");
        setFiltersCollapsed(shouldCollapse);
        saveFilterVisibilityState(shouldCollapse);
      });

      restoreHighlightColors();
      renderLegend();
      restoreFilterVisibilityState();
      restoreFilterState();
      renderCalendar();
    })();
  </script>
</body>
</html>
