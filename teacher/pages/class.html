<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Schedule</title>
  <link rel="stylesheet" href="../../assets/css/schedule.css" />
</head>

<body>
  <main id="class-page"></main>
  <script>
    (function () {
      var main = document.getElementById('class-page');
      if (!main) return;

      var params = new URLSearchParams(window.location.search);
      var grade = params.get('grade');
      var section = params.get('section');

      if (!grade || !section) {
        var match = window.location.pathname.match(/\/(10|11)([A-E])\.html$/i);
        if (match) {
          grade = match[1];
          section = match[2];
        }
      }

      if (grade && section) {
        section = section.toUpperCase();
        main.dataset.grade = grade;
        main.dataset.section = section;
        document.title = 'Schedule ' + grade + section;
      }
    })();
  </script>
  <script src="../assets/js/class-data.js" defer></script>
  <script src="../assets/js/class-page.js" defer></script>
  <script src="../assets/js/schedule-data.js" defer></script>
  <script src="../assets/js/schedule-renderer.js" defer></script>
  <script src="../assets/js/schedule-today.js" defer></script>
</body>
</html>
