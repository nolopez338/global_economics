<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Weekly Schedule</title>
  <link rel="stylesheet" href="../assets/css/schedule.css" />
  <link rel="stylesheet" href="./assets/css/principal-schedule.css" />
</head>

<body>
  <main id="protected-content">
    <nav class="breadcrumbs top-controls" aria-label="Main navigation">
      <a class="back-link" href="../index.html">← Back to Main</a>
      <a class="back-link" href="./assets/html/general_calendar.html?origin=schedule">Calendar View</a>
    </nav>
    <section class="class-pages" aria-label="Class pages">
      <h2>
        <button class="collapsible-toggle" type="button" aria-expanded="false" aria-controls="class-pages-panel">
          <span>Class Pages</span>
          <span class="collapsible-icon" aria-hidden="true">+</span>
        </button>
      </h2>
      <div class="class-grid" id="class-pages-panel" hidden>
        <a class="class-card" href="pages/class_schedules/10A.html" aria-label="Open schedule page for class 10A">
          <span class="class-icon warm-2">10A</span>
        </a>
        <a class="class-card" href="pages/class_schedules/10B.html" aria-label="Open schedule page for class 10B">
          <span class="class-icon warm">10B</span>
        </a>
        <a class="class-card" href="pages/class_schedules/10C.html" aria-label="Open schedule page for class 10C">
          <span class="class-icon warm">10C</span>
        </a>
        <a class="class-card" href="pages/class_schedules/10D.html" aria-label="Open schedule page for class 10D">
          <span class="class-icon warm">10D</span>
        </a>
        <a class="class-card" href="pages/class_schedules/10E.html" aria-label="Open schedule page for class 10E">
          <span class="class-icon warm">10E</span>
        </a>
        <a class="class-card" href="pages/class_schedules/11A.html" aria-label="Open schedule page for class 11A">
          <span class="class-icon cool-2">11A</span>
        </a>
        <a class="class-card" href="pages/class_schedules/11B.html" aria-label="Open schedule page for class 11B">
          <span class="class-icon cool">11B</span>
        </a>
        <a class="class-card" href="pages/class_schedules/11C.html" aria-label="Open schedule page for class 11C">
          <span class="class-icon cool">11C</span>
        </a>
        <a class="class-card" href="pages/class_schedules/11D.html" aria-label="Open schedule page for class 11D">
          <span class="class-icon cool">11D</span>
        </a>
        <a class="class-card" href="pages/class_schedules/11E.html" aria-label="Open schedule page for class 11E">
          <span class="class-icon cool">11E</span>
        </a>
        <a class="class-card" href="pages/full_schedule.html?origin=schedule" aria-label="Open full schedule page">
          <span class="class-icon purple">FULL</span>
        </a>
      </div>
    </section>

    <div id="weekly-schedule-table-root" data-weekly-schedule-table-root></div>
  </main>
  <div class="weekday-menu" id="weekday-menu" role="menu" aria-hidden="true" hidden>
    <button type="button" role="menuitem" data-weekday="Monday">Monday</button>
    <button type="button" role="menuitem" data-weekday="Tuesday">Tuesday</button>
    <button type="button" role="menuitem" data-weekday="Wednesday">Wednesday</button>
    <button type="button" role="menuitem" data-weekday="Thursday">Thursday</button>
    <button type="button" role="menuitem" data-weekday="Friday">Friday</button>
  </div>
  <script src="./assets/js/render-weekly-schedule-table.js"></script>
  <script>
    window.renderWeeklyScheduleTable("[data-weekly-schedule-table-root]");
  </script>
  <script src="./assets/js/principal-schedule.js"></script>
</body>
</html>
