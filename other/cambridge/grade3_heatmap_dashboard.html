<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cambridge Stage 4 Results</title>
  <link rel="stylesheet" href="grade3_heatmap_dashboard.css" />
</head>
<body>
  <header>
    <h1>Cambridge - Stage 4 Results</h1>
  </header>

  <main class="wrap">
    <section class="controls" aria-label="Dashboard controls">
      <div class="control view">
        <label for="resultView">Result view</label>
        <select id="resultView">
          <option value="paper1">Paper 1</option>
          <option value="paper2">Paper 2</option>
          <option value="accumulated">Accumulated</option>
        </select>
      </div>
      <div class="control">
        <label for="groupFilter">Group</label>
        <select id="groupFilter">
          <option value="all">All groups</option>
          <option value="C">Group C</option>
          <option value="F">Group F</option>
        </select>
      </div>
      <div class="control search">
        <label for="searchBox">Search student</label>
        <input id="searchBox" type="search" placeholder="Type a name or matrícula" />
      </div>
    </section>

    <section class="stats groupedStats" id="stats"></section>

    <section class="vizPanel">
      <div class="vizToolbar" id="vizToolbar" aria-label="Visualization controls">
        <div class="vizToolbarHeader">
          <button
            id="vizToolbarCollapseBtn"
            class="vizToolbarCollapseBtn"
            type="button"
            aria-expanded="true"
            aria-controls="vizToolbarBody"
            title="Collapse visualization controls"
          >
            Controls
            <span class="collapseIcon" aria-hidden="true">▾</span>
          </button>
          <span id="activeSummary"></span>
        </div>
        <div class="vizToolbarBody" id="vizToolbarBody">
          <div class="legend">
            <div class="legendItems">
              <span><i class="swatch" style="background:var(--green)"></i>Positive</span>
              <span><i class="swatch" style="background:var(--yellow)"></i>Non Responses</span>
              <span><i class="swatch" style="background:var(--red)"></i>Negative</span>
              <label class="missingLegendToggle" title="Show or hide students with missing values">
                <input id="showMissing" type="checkbox" aria-label="Show students with missing values" />
                <span class="missingSwatch" aria-hidden="true"></span>
                <span>Missing</span>
              </label>
            </div>
          </div>
          <div class="vizToolbarControls">
            <div class="vizToolbarGroup">
              <label for="sortRows">Sort students</label>
              <select id="sortRows">
                <option value="original">Original order</option>
                <option value="positiveDesc">Positives</option>
                <option value="negativeDesc">Negatives</option>
                <option value="zeroDesc">Non responses</option>
                <option value="nameAsc">Name A–Z</option>
              </select>
            </div>
            <div class="vizToolbarGroup">
              <label for="sortCols">Sort questions</label>
              <select id="sortCols">
                <option value="original">Original order</option>
                <option value="positiveDesc">Positives</option>
                <option value="negativeDesc">Negatives</option>
                <option value="zeroDesc">Non responses</option>
              </select>
            </div>
          </div>
        </div>
      </div>
      <div class="dashboardScroll">
        <div class="dashboardGrid" id="dashboardGrid">
          <div class="corner">
            <div class="cornerTitle">Students × Questions</div>
            <label class="rowLabelToggle" title="Toggle full or compact student names">
              Row labels
              <input id="showNames" type="checkbox" checked aria-label="Use full row labels" />
              <span class="switch" aria-hidden="true"></span>
            </label>
          </div>
          <div class="topBars" id="topBars">
            <button
              id="questionOverviewBtn"
              class="overviewToggleBtn questionOverviewFixedBtn"
              type="button"
              aria-pressed="false"
              title="Show full question scope"
            >
              Full question scope
            </button>
            <div class="topBarsContent" id="topBarsContent"></div>
          </div>
          <div class="rightHeader">
            <button id="fullscreenBtn" class="fullscreenBtn" type="button" aria-label="Open visualization in fullscreen" title="Fullscreen">
              ⛶
            </button>
          </div>
          <div class="names" id="names"></div>
          <div class="heatmap" id="heatmap"></div>
          <div class="rightBars" id="rightBars">
            <button
              id="studentOverviewBtn"
              class="overviewToggleBtn studentOverviewFixedBtn"
              type="button"
              aria-pressed="false"
              title="Show full student scope"
            >
              Full student scope
            </button>
            <div class="rightBarsContent" id="rightBarsContent"></div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div class="tooltip" id="tooltip"></div>
  <div class="tooltip cellContextTooltip cellQuestionTooltip" id="cellQuestionTooltip"></div>
  <div class="tooltip cellContextTooltip cellStudentTooltip" id="cellStudentTooltip"></div>

  <script src="grade3_heatmap_dashboard_data.js"></script>
  <script src="grade3_heatmap_dashboard.js"></script>
</body>
</html>
