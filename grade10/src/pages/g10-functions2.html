<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Functions as a Vertical Machine (Part 2)</title>
  <style>
    :root {
      --green: #2f9e44;
      --green-dark: #1f6f30;
      --purple: #7048e8;
      --purple-dark: #4b2da6;
      --red: #e03131;
      --red-dark: #a61e1e;
      --ink: #1f2937;
      --soft: #f5f3ff;
      --line: #d1d5db;
      --panel: #ffffff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--ink);
      background: linear-gradient(180deg, #f8fafc, #eef2ff);
      min-height: 100vh;
      line-height: 1.45;
    }

    .page {
      max-width: 1024px;
      margin: 0 auto;
      padding: 1.25rem;
    }

    h1 {
      margin: 0 0 0.5rem;
      font-size: clamp(1.7rem, 2.5vw, 2.4rem);
      color: #312e81;
    }

    .intro {
      margin: 0 0 1rem;
      font-size: 1.05rem;
      color: #4338ca;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: 0 8px 24px rgba(37, 99, 235, 0.08);
      padding: 1rem;
      margin-bottom: 1rem;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 0.85rem;
      align-items: end;
    }

    .control-fields {
      display: flex;
      gap: 0.85rem;
      align-items: end;
      flex-wrap: wrap;
    }

    .control-fields .field {
      flex: 1 1 220px;
      min-width: 220px;
    }

    .field label {
      display: block;
      margin-bottom: 0.35rem;
      font-weight: 600;
    }

    .field input {
      width: 100%;
      border: 2px solid #c7d2fe;
      border-radius: 10px;
      padding: 0.65rem 0.75rem;
      font-size: 1rem;
      font-family: inherit;
    }

    .field input:focus {
      outline: none;
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.16);
    }

    .button-row {
      display: flex;
      gap: 0.65rem;
      flex-wrap: wrap;
    }

    button {
      cursor: pointer;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      padding: 0.65rem 1rem;
      min-width: 110px;
    }

    #applyBtn {
      background: #4f46e5;
      color: white;
    }

    #resetBtn {
      background: #e5e7eb;
      color: #111827;
    }

    .status {
      min-height: 1.6rem;
      margin-top: 0.5rem;
      font-size: 0.98rem;
      font-weight: 600;
    }

    .status.error { color: #b91c1c; }
    .status.info { color: #3730a3; }
    .status.success { color: #166534; }

    .graph-stage {
      margin-top: 0.25rem;
      position: relative;
      border-radius: 14px;
      border: 2px dashed #c7d2fe;
      background: #f8faff;
      padding: 1rem;
    }

    .graph-toggle {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      margin-bottom: 0.6rem;
      gap: 0.5rem;
      font-size: 0.96rem;
      color: #312e81;
      font-weight: 600;
    }

    .graph-toggle input {
      width: 1rem;
      height: 1rem;
      accent-color: #4f46e5;
    }

    .flow-label {
      text-align: center;
      font-size: 1.05rem;
      margin-bottom: 0.7rem;
      color: #312e81;
      font-weight: 700;
    }

    .tips {
      margin: 0 0 0.75rem;
      font-size: 0.98rem;
      color: #4338ca;
    }

    .graph-wrap {
      position: relative;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid #cbd5e1;
      background: white;
      touch-action: none;
    }

    .graph-rule-box {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 2;
      background: linear-gradient(135deg, #845ef7, #4b2da6);
      color: #ffffff;
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: 10px;
      padding: 0.45rem 0.65rem;
      font-size: 0.95rem;
      font-weight: 700;
      line-height: 1.25;
      text-align: center;
      box-shadow: 0 6px 16px rgba(75, 45, 166, 0.25);
      max-width: 44%;
      word-break: break-word;
      pointer-events: none;
    }

    .graph-wrap[hidden] {
      display: none;
    }

    .graph-hidden-note {
      display: none;
      margin: 0;
      padding: 0.7rem 0.8rem;
      border-radius: 10px;
      border: 1px dashed #c7d2fe;
      background: #eef2ff;
      color: #4338ca;
      font-size: 0.95rem;
    }

    .graph-wrap[hidden] + .graph-hidden-note {
      display: block;
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
      max-width: 100%;
    }

    .steps {
      margin-top: 1rem;
      background: var(--soft);
      border: 1px solid #ddd6fe;
      border-radius: 10px;
      padding: 0.8rem;
    }

    .steps h2 {
      margin: 0 0 0.5rem;
      font-size: 1.1rem;
      color: #4c1d95;
    }

    .steps p {
      margin: 0.33rem 0;
      font-size: 1rem;
    }

    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-weight: 700;
    }

    @media (max-width: 720px) {
      .graph-stage { padding: 0.8rem; }
      .tips { font-size: 0.92rem; }
      button { min-width: 100px; }
    }
  </style>
</head>
<body>
  <main class="page">
    <h1>Functions 2</h1>

    <section class="card">
      <div class="controls">
        <div class="control-fields">
          <div class="field">
            <label for="transformationNameInput">Transformation name</label>
            <input id="transformationNameInput" type="text" value="name_transformation" />
          </div>
          <div class="field">
            <label for="ruleInput">Transformation rule</label>
            <input id="ruleInput" type="text" value="x^2" aria-describedby="statusMsg" />
          </div>
        </div>

        <div class="button-row">
          <button id="applyBtn" type="button">Apply Rule</button>
          <button id="resetBtn" type="button">Reset</button>
        </div>
      </div>
      <div id="statusMsg" class="status info" role="status" aria-live="polite">Set a rule, drag the stack horizontally, and click the purple chevron to add stem markers.</div>
    </section>

    <section class="card graph-stage" aria-label="Function graph with draggable vertical machine">
      <div class="flow-label">input &rarr; function / transformation &rarr; output</div>
      <div class="graph-toggle">
        <label for="graphVisibilityToggle">Show graph</label>
        <input id="graphVisibilityToggle" type="checkbox" aria-controls="graphWrap" />
      </div>
      <div class="graph-wrap" id="graphWrap">
        <div class="graph-rule-box" id="graphRuleBox" aria-live="polite"></div>
        <canvas id="graphCanvas" width="960" height="540" aria-label="Coordinate graph"></canvas>
      </div>
      <p class="graph-hidden-note" aria-live="polite">Graph is hidden. Turn on “Show graph” to display it.</p>

      <div class="steps" aria-live="polite">
        <h2>Current Values</h2>
        <p id="stepVar">Variable: <span class="mono">-</span></p>
        <p id="stepSub">Substitution: <span class="mono">-</span></p>
        <p id="stepOut">Output: <span class="mono">-</span></p>
      </div>
    </section>
  </main>

  <script>
    const transformationNameInput = document.getElementById('transformationNameInput');
    const ruleInput = document.getElementById('ruleInput');
    const applyBtn = document.getElementById('applyBtn');
    const resetBtn = document.getElementById('resetBtn');
    const statusMsg = document.getElementById('statusMsg');
    const graphWrap = document.getElementById('graphWrap');
    const graphRuleBox = document.getElementById('graphRuleBox');
    const graphVisibilityToggle = document.getElementById('graphVisibilityToggle');
    const canvas = document.getElementById('graphCanvas');
    const ctx = canvas.getContext('2d');

    const stepVar = document.getElementById('stepVar');
    const stepSub = document.getElementById('stepSub');
    const stepOut = document.getElementById('stepOut');

    const domain = { xMin: -10, xMax: 10, yMin: -10, yMax: 10 };
    const dims = {
      padLeft: 58,
      padRight: 32,
      padTop: 26,
      padBottom: 48
    };

    const boxSize = { h: 26, gap: 8, minValueW: 44, valuePadX: 10, chevronW: 66 };
    const machine = {
      x: 0,
      yInput: 0,
      variable: 'x',
      transformationName: 'name_transformation',
      ruleText: 'x^2',
      rpn: null
    };
    const appliedDisplayState = {
      transformationName: 'name_transformation',
      ruleText: 'x^2'
    };

    let stems = [];
    let dragState = null;
    let showFunctionLine = false;
    let hoverStemIndex = -1;

    function setStatus(message, type = 'info') {
      statusMsg.className = `status ${type}`;
      statusMsg.textContent = message;
    }

    function tokenize(expr) {
      const tokens = [];
      let i = 0;

      while (i < expr.length) {
        const ch = expr[i];

        if (/\s/.test(ch)) { i += 1; continue; }

        if (/[0-9.]/.test(ch)) {
          let start = i;
          let dotCount = 0;
          while (i < expr.length && /[0-9.]/.test(expr[i])) {
            if (expr[i] === '.') dotCount += 1;
            i += 1;
          }
          const raw = expr.slice(start, i);
          if (dotCount > 1 || raw === '.') throw new Error(`Invalid number: ${raw}`);
          tokens.push({ type: 'number', value: Number(raw), raw });
          continue;
        }

        if (/[A-Za-z_]/.test(ch)) {
          let start = i;
          i += 1;
          while (i < expr.length && /[A-Za-z0-9_]/.test(expr[i])) i += 1;
          tokens.push({ type: 'identifier', value: expr.slice(start, i) });
          continue;
        }

        if ('+-*^()'.includes(ch)) {
          tokens.push({ type: 'operator', value: ch });
          i += 1;
          continue;
        }

        throw new Error(`Invalid character: ${ch}`);
      }

      if (tokens.length === 0) throw new Error('Expression cannot be empty.');
      return tokens;
    }

    function toRpn(tokens) {
      const output = [];
      const stack = [];
      const precedence = { '+': 1, '-': 1, '*': 2, '^': 3, 'u-': 4 };
      const rightAssoc = { '^': true, 'u-': true };

      let prevType = 'start';

      for (const token of tokens) {
        if (token.type === 'number' || token.type === 'identifier') {
          output.push(token);
          prevType = token.type;
          continue;
        }

        const op = token.value;

        if (op === '(') {
          stack.push({ type: 'paren', value: op });
          prevType = 'leftParen';
          continue;
        }

        if (op === ')') {
          let foundLeft = false;
          while (stack.length > 0) {
            const top = stack.pop();
            if (top.type === 'paren' && top.value === '(') {
              foundLeft = true;
              break;
            }
            output.push(top);
          }
          if (!foundLeft) throw new Error('Mismatched parentheses.');
          prevType = 'rightParen';
          continue;
        }

        let opVal = op;
        if (op === '-' && (prevType === 'start' || prevType === 'operator' || prevType === 'leftParen')) {
          opVal = 'u-';
        }

        const current = { type: 'operator', value: opVal };

        while (stack.length > 0) {
          const top = stack[stack.length - 1];
          if (top.type !== 'operator') break;
          const topPrec = precedence[top.value];
          const curPrec = precedence[current.value];
          if (
            (rightAssoc[current.value] && curPrec < topPrec) ||
            (!rightAssoc[current.value] && curPrec <= topPrec)
          ) {
            output.push(stack.pop());
          } else {
            break;
          }
        }

        stack.push(current);
        prevType = 'operator';
      }

      while (stack.length > 0) {
        const top = stack.pop();
        if (top.type === 'paren') throw new Error('Mismatched parentheses.');
        output.push(top);
      }

      return output;
    }

    function evaluateRpn(rpn, variableValueMap) {
      const stack = [];

      for (const token of rpn) {
        if (token.type === 'number') {
          stack.push(token.value);
          continue;
        }

        if (token.type === 'identifier') {
          if (!(token.value in variableValueMap)) {
            throw new Error(`Unknown variable: ${token.value}`);
          }
          stack.push(variableValueMap[token.value]);
          continue;
        }

        if (token.type === 'operator') {
          if (token.value === 'u-') {
            if (stack.length < 1) throw new Error('Invalid unary minus usage.');
            const a = stack.pop();
            stack.push(-a);
            continue;
          }

          if (stack.length < 2) throw new Error('Invalid expression structure.');
          const b = stack.pop();
          const a = stack.pop();

          switch (token.value) {
            case '+': stack.push(a + b); break;
            case '-': stack.push(a - b); break;
            case '*': stack.push(a * b); break;
            case '^':
              if (!Number.isInteger(b)) {
                throw new Error('Exponents must be integers.');
              }
              if (b < 0) {
                throw new Error('Negative exponents are not allowed.');
              }
              stack.push(a ** b);
              break;
            default:
              throw new Error(`Unsupported operator: ${token.value}`);
          }
        }
      }

      if (stack.length !== 1) throw new Error('Expression could not be evaluated.');
      const result = stack[0];
      if (!Number.isFinite(result)) throw new Error('Result is not finite.');
      return result;
    }

    function extractSingleVariable(tokens) {
      const vars = [...new Set(tokens.filter(t => t.type === 'identifier').map(t => t.value))];
      if (vars.length === 0) {
        throw new Error('Use one variable in the rule, such as x, Number, or value.');
      }
      if (vars.length > 1) {
        throw new Error(`Only one variable is allowed. Found: ${vars.join(', ')}`);
      }
      return vars[0];
    }

    function substituteExpression(expression, variableName, value) {
      const escaped = variableName.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      const pattern = new RegExp(`\\b${escaped}\\b`, 'g');
      return expression.replace(pattern, `(${format2(value)})`);
    }

    function normalizeDisplayValue(value) {
      if (!Number.isFinite(value)) return value;
      return Math.abs(value) < 0.0005 ? 0 : value;
    }

    function isNegativeOutput(value) {
      if (!Number.isFinite(value)) return false;
      return normalizeDisplayValue(value) < 0;
    }

    function format2(value) {
      if (!Number.isFinite(value)) return 'undefined';
      return normalizeDisplayValue(value).toFixed(2);
    }

    function getTransformationName() {
      const candidate = transformationNameInput.value.trim();
      return candidate || 'name_transformation';
    }

    function getRuleBoxDisplayMode() {
      const mode = (graphRuleBox.dataset.displayMode || 'expression').toLowerCase();
      if (mode === 'name' || mode === 'expression') return mode;
      return 'expression';
    }

    function updateGraphRuleBox() {
      const mode = getRuleBoxDisplayMode();
      if (mode === 'name') {
        graphRuleBox.textContent = appliedDisplayState.transformationName;
        return;
      }

      graphRuleBox.textContent = `${appliedDisplayState.transformationName}(x) = ${appliedDisplayState.ruleText}`;
    }

    function hexToRgba(hex, alpha) {
      const clean = hex.replace('#', '');
      const full = clean.length === 3
        ? clean.split('').map(ch => ch + ch).join('')
        : clean;
      const int = Number.parseInt(full, 16);
      const r = (int >> 16) & 255;
      const g = (int >> 8) & 255;
      const b = int & 255;
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    function clamp(num, min, max) {
      return Math.min(max, Math.max(min, num));
    }

    function plotWidth() {
      return canvas.width - dims.padLeft - dims.padRight;
    }

    function plotHeight() {
      return canvas.height - dims.padTop - dims.padBottom;
    }

    function xToPx(x) {
      return dims.padLeft + ((x - domain.xMin) / (domain.xMax - domain.xMin)) * plotWidth();
    }

    function yToPx(y) {
      return dims.padTop + ((domain.yMax - y) / (domain.yMax - domain.yMin)) * plotHeight();
    }

    function pxToX(px) {
      const t = (px - dims.padLeft) / plotWidth();
      return domain.xMin + t * (domain.xMax - domain.xMin);
    }

    function evaluateAtX(x) {
      if (!machine.rpn) return NaN;
      return evaluateRpn(machine.rpn, { [machine.variable]: x });
    }

    function drawGrid() {
      ctx.save();
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.strokeStyle = '#e2e8f0';
      ctx.lineWidth = 1;

      for (let x = Math.ceil(domain.xMin); x <= Math.floor(domain.xMax); x += 1) {
        const px = xToPx(x);
        ctx.beginPath();
        ctx.moveTo(px, dims.padTop);
        ctx.lineTo(px, canvas.height - dims.padBottom);
        ctx.stroke();
      }

      for (let y = Math.ceil(domain.yMin); y <= Math.floor(domain.yMax); y += 1) {
        const py = yToPx(y);
        ctx.beginPath();
        ctx.moveTo(dims.padLeft, py);
        ctx.lineTo(canvas.width - dims.padRight, py);
        ctx.stroke();
      }

      ctx.strokeStyle = '#64748b';
      ctx.lineWidth = 2;
      const xAxisY = yToPx(0);
      const yAxisX = xToPx(0);

      ctx.beginPath();
      ctx.moveTo(dims.padLeft, xAxisY);
      ctx.lineTo(canvas.width - dims.padRight, xAxisY);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(yAxisX, dims.padTop);
      ctx.lineTo(yAxisX, canvas.height - dims.padBottom);
      ctx.stroke();

      ctx.fillStyle = '#334155';
      ctx.font = '12px Segoe UI, sans-serif';
      ctx.textAlign = 'center';
      for (let x = -10; x <= 10; x += 2) {
        const px = xToPx(x);
        ctx.fillText(String(x), px, xAxisY + 18);
      }

      ctx.textAlign = 'right';
      for (let y = -10; y <= 10; y += 2) {
        if (y === 0) continue;
        const py = yToPx(y);
        ctx.fillText(String(y), dims.padLeft - 8, py + 4);
      }
      ctx.restore();
    }

    function drawFunctionCurve() {
      ctx.save();
      ctx.strokeStyle = '#4f46e5';
      ctx.lineWidth = 2.25;
      ctx.beginPath();
      let started = false;

      const steps = 600;
      for (let i = 0; i <= steps; i += 1) {
        const x = domain.xMin + (i / steps) * (domain.xMax - domain.xMin);
        let y;
        try {
          y = evaluateAtX(x);
        } catch (_) {
          y = NaN;
        }

        if (!Number.isFinite(y) || y < domain.yMin - 10 || y > domain.yMax + 10) {
          started = false;
          continue;
        }

        const px = xToPx(x);
        const py = yToPx(y);
        if (!started) {
          ctx.moveTo(px, py);
          started = true;
        } else {
          ctx.lineTo(px, py);
        }
      }

      ctx.stroke();
      ctx.restore();
    }

    function drawStemMarkers() {
      const xAxisY = yToPx(0);
      ctx.save();
      for (let i = 0; i < stems.length; i += 1) {
        const stem = stems[i];
        const px = xToPx(stem.x);
        const py = yToPx(stem.y);
        const isHovered = i === hoverStemIndex;
        drawStemAtCoordinates(px, py, xAxisY, {
          strokeStyle: '#9333ea',
          lineWidth: isHovered ? 2.4 : 2,
          pointFill: '#e03131',
          pointRadius: 5,
          pointBorder: '#ffffff',
          pointBorderWidth: 1.5
        });

        if (isHovered) {
          drawHoverLabel(px, py - 22, ['f(x) =', format2(stem.y)], 'top');
          drawHoverLabel(px, xAxisY + 22, ['x =', format2(stem.x)], 'bottom');
        }
      }
      ctx.restore();
    }

    function drawStemAtCoordinates(px, py, xAxisY, style) {
      ctx.strokeStyle = style.strokeStyle;
      ctx.lineWidth = style.lineWidth;
      ctx.setLineDash(style.dashPattern || []);
      ctx.beginPath();
      ctx.moveTo(px, xAxisY);
      ctx.lineTo(px, py);
      ctx.stroke();
      ctx.setLineDash([]);

      ctx.fillStyle = style.pointFill;
      ctx.beginPath();
      ctx.arc(px, py, style.pointRadius, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = style.pointBorder;
      ctx.lineWidth = style.pointBorderWidth;
      ctx.stroke();
    }

    function drawPreviewStem() {
      let y;
      try {
        y = evaluateAtX(machine.x);
      } catch (_) {
        y = NaN;
      }
      if (!Number.isFinite(y)) return;

      const xAxisY = yToPx(0);
      const px = xToPx(machine.x);
      const py = yToPx(y);

      ctx.save();
      drawStemAtCoordinates(px, py, xAxisY, {
        strokeStyle: 'rgba(147, 51, 234, 0.72)',
        lineWidth: 2,
        dashPattern: [6, 5],
        pointFill: 'rgba(224, 49, 49, 0.62)',
        pointRadius: 4.5,
        pointBorder: 'rgba(255, 255, 255, 0.9)',
        pointBorderWidth: 1.25
      });
      ctx.restore();
    }

    function drawHoverLabel(anchorX, anchorY, lines, anchor) {
      const padX = 8;
      const padY = 6;
      const lineHeight = 12;
      const radius = 8;
      const safe = 6;

      ctx.font = '700 11px Segoe UI, sans-serif';
      const textW = Math.max(...lines.map(line => ctx.measureText(line).width));
      const w = Math.max(44, textW + padX * 2);
      const h = lineHeight * lines.length + padY * 2;

      let x = anchorX - w / 2;
      x = clamp(x, safe, canvas.width - w - safe);

      let y = anchor === 'top' ? anchorY - h : anchorY;
      y = clamp(y, safe, canvas.height - h - safe);

      roundedRectPath(x, y, w, h, radius);
      ctx.fillStyle = 'rgba(255,255,255,0.97)';
      ctx.fill();
      ctx.strokeStyle = 'rgba(15,23,42,0.2)';
      ctx.lineWidth = 1;
      ctx.stroke();

      ctx.fillStyle = '#1f2937';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      lines.forEach((line, idx) => {
        const lineY = y + padY + lineHeight * (idx + 0.5);
        ctx.fillText(line, x + w / 2, lineY);
      });
    }

    function roundedRectPath(x, y, w, h, r = 10) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function drawBox(x, y, w, h, colorA, colorB, valueText, options = {}) {
      const grad = ctx.createLinearGradient(x, y, x + w, y + h);
      grad.addColorStop(0, colorA);
      grad.addColorStop(1, colorB);

      roundedRectPath(x, y, w, h, 11);
      ctx.fillStyle = grad;
      ctx.fill();

      ctx.strokeStyle = 'rgba(255,255,255,0.55)';
      ctx.lineWidth = 1.25;
      ctx.stroke();

      if (options.centerAlpha !== undefined) {
        const inset = 4;
        const innerW = w - inset * 2;
        const innerH = h - inset * 2;
        if (innerW > 0 && innerH > 0) {
          const innerGrad = ctx.createLinearGradient(x + inset, y + inset, x + w - inset, y + h - inset);
          innerGrad.addColorStop(0, hexToRgba(colorA, options.centerAlpha));
          innerGrad.addColorStop(1, hexToRgba(colorB, options.centerAlpha));
          roundedRectPath(x + inset, y + inset, innerW, innerH, 6);
          ctx.fillStyle = innerGrad;
          ctx.fill();
        }
      }

      ctx.fillStyle = '#ffffff';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      if (options.rotateRadians) {
        ctx.save();
        ctx.translate(x + w / 2, y + h / 2);
        ctx.rotate(options.rotateRadians);
        ctx.font = '900 10px Segoe UI, sans-serif';
        ctx.fillText(valueText, 0, 0);
        ctx.restore();
      } else {
        ctx.font = '900 11px Segoe UI, sans-serif';
        ctx.fillText(valueText, x + w / 2, y + h / 2);
      }
    }

    function drawChevron(x, y, w, h, colorA, colorB, direction = 'up') {
      const peakHeight = Math.min(10, h * 0.38);
      const shoulderInset = Math.max(8, w * 0.2);
      const grad = ctx.createLinearGradient(x, y, x + w, y + h);
      grad.addColorStop(0, colorA);
      grad.addColorStop(1, colorB);

      ctx.beginPath();
      if (direction === 'down') {
        ctx.moveTo(x, y);
        ctx.lineTo(x + w, y);
        ctx.lineTo(x + w - shoulderInset, y + h - peakHeight);
        ctx.lineTo(x + w / 2, y + h);
        ctx.lineTo(x + shoulderInset, y + h - peakHeight);
      } else {
        ctx.moveTo(x + shoulderInset, y + peakHeight);
        ctx.lineTo(x + w / 2, y);
        ctx.lineTo(x + w - shoulderInset, y + peakHeight);
        ctx.lineTo(x + w, y + h);
        ctx.lineTo(x, y + h);
      }
      ctx.closePath();

      ctx.fillStyle = grad;
      ctx.fill();

      ctx.strokeStyle = 'rgba(255,255,255,0.6)';
      ctx.lineWidth = 1.25;
      ctx.stroke();
    }

    function drawCenteredTextFit(text, centerX, centerY, maxWidth, maxLines = 2) {
      const minFont = 7;
      const maxFont = 10;
      let fontSize = maxFont;
      let lines = [text];

      function splitIntoLines(fontPx) {
        ctx.font = `800 ${fontPx}px Segoe UI, sans-serif`;
        const words = text.split(/\s+/).filter(Boolean);
        if (words.length < 2) return [text];

        const rows = [];
        let current = words[0];
        for (let i = 1; i < words.length; i += 1) {
          const candidate = `${current} ${words[i]}`;
          if (ctx.measureText(candidate).width <= maxWidth) {
            current = candidate;
          } else {
            rows.push(current);
            current = words[i];
          }
        }
        rows.push(current);
        return rows;
      }

      while (fontSize >= minFont) {
        lines = splitIntoLines(fontSize);
        ctx.font = `800 ${fontSize}px Segoe UI, sans-serif`;
        const widest = Math.max(...lines.map(line => ctx.measureText(line).width));
        if (widest <= maxWidth && lines.length <= maxLines) break;
        fontSize -= 1;
      }

      if (lines.length > maxLines) {
        lines = lines.slice(0, maxLines);
        const last = lines[maxLines - 1];
        let clipped = last;
        ctx.font = `800 ${fontSize}px Segoe UI, sans-serif`;
        while (clipped.length > 0 && ctx.measureText(`${clipped}…`).width > maxWidth) {
          clipped = clipped.slice(0, -1);
        }
        lines[maxLines - 1] = `${clipped}…`;
      }

      ctx.fillStyle = '#ffffff';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.font = `800 ${fontSize}px Segoe UI, sans-serif`;

      const lineHeight = fontSize * 1.15;
      const blockHeight = lineHeight * lines.length;
      let y = centerY - blockHeight / 2 + lineHeight / 2;
      for (const line of lines) {
        ctx.fillText(line, centerX, y);
        y += lineHeight;
      }
    }

    function drawMachine() {
      const xPx = xToPx(machine.x);
      const yVal = evaluateAtX(machine.x);
      const yDisplay = Number.isFinite(yVal) ? format2(yVal) : 'undefined';
      const xDisplay = format2(machine.x);
      const isNegative = isNegativeOutput(yVal);
      const direction = isNegative ? 1 : -1;

      const yInput = yToPx(0) - boxSize.h / 2;
      const yFunction = yInput + direction * (boxSize.h + boxSize.gap);
      const yOutput = yFunction + direction * (boxSize.h + boxSize.gap);
      machine.yInput = yInput;

      ctx.font = '900 11px Segoe UI, sans-serif';
      const inputW = Math.max(boxSize.minValueW, Math.ceil(ctx.measureText(xDisplay).width + boxSize.valuePadX * 2));
      const outputW = Math.max(boxSize.minValueW, Math.ceil(ctx.measureText(yDisplay).width + boxSize.valuePadX * 2));
      const chevronW = Math.max(boxSize.chevronW, Math.max(inputW, outputW));

      drawBox(
        xPx - outputW / 2,
        yOutput,
        outputW,
        boxSize.h,
        '#fa5252',
        '#a61e1e',
        yDisplay,
        { centerAlpha: 0.58 }
      );

      const functionBoxX = xPx - chevronW / 2;
      drawChevron(
        functionBoxX,
        yFunction,
        chevronW,
        boxSize.h,
        '#845ef7',
        '#4b2da6',
        isNegative ? 'down' : 'up'
      );
      drawCenteredTextFit(
        machine.transformationName,
        xPx,
        yFunction + boxSize.h / 2,
        chevronW - 12,
        2
      );

      drawBox(
        xPx - inputW / 2,
        yInput,
        inputW,
        boxSize.h,
        '#40c057',
        '#1f6f30',
        xDisplay,
        { centerAlpha: 0.58 }
      );

      ctx.save();
      ctx.strokeStyle = '#64748b';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(xPx, yToPx(0) + boxSize.h * 0.56);
      ctx.lineTo(xPx, yToPx(0) - 10);
      ctx.stroke();
      ctx.restore();

      return {
        input: { x: xPx - inputW / 2, y: yInput, w: inputW, h: boxSize.h },
        function: { x: xPx - chevronW / 2, y: yFunction, w: chevronW, h: boxSize.h },
        output: { x: xPx - outputW / 2, y: yOutput, w: outputW, h: boxSize.h }
      };
    }

    function draw() {
      drawGrid();
      if (showFunctionLine) {
        drawFunctionCurve();
      }
      drawStemMarkers();
      drawPreviewStem();
      const boxes = drawMachine();
      return boxes;
    }

    function updateReadout() {
      const xVal = machine.x;
      let yVal;
      try {
        yVal = evaluateAtX(xVal);
      } catch (_) {
        yVal = NaN;
      }

      const substitution = substituteExpression(machine.ruleText, machine.variable, xVal);
      stepVar.innerHTML = `Variable: <span class="mono">${machine.variable} = ${format2(xVal)}</span>`;
      stepSub.innerHTML = `Substitution: <span class="mono">${machine.ruleText} &rarr; ${substitution}</span>`;
      const outText = Number.isFinite(yVal) ? format2(yVal) : 'undefined';
      stepOut.innerHTML = `Output: <span class="mono">f(${format2(xVal)}) = ${outText}</span>`;
    }

    function clientToCanvas(clientX, clientY) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      return {
        x: (clientX - rect.left) * scaleX,
        y: (clientY - rect.top) * scaleY
      };
    }

    function inRect(point, rect) {
      return point.x >= rect.x && point.x <= rect.x + rect.w && point.y >= rect.y && point.y <= rect.y + rect.h;
    }

    function getStemIndexAtPoint(point) {
      const xAxisY = yToPx(0);
      for (let i = stems.length - 1; i >= 0; i -= 1) {
        const stem = stems[i];
        const px = xToPx(stem.x);
        const py = yToPx(stem.y);
        const nearLine = Math.abs(point.x - px) <= 7
          && point.y >= Math.min(py, xAxisY) - 6
          && point.y <= Math.max(py, xAxisY) + 6;
        const nearPoint = Math.hypot(point.x - px, point.y - py) <= 9;
        if (nearLine || nearPoint) return i;
      }
      return -1;
    }

    function addStemAtCurrentX() {
      const x = machine.x;
      let y;
      try {
        y = evaluateAtX(x);
      } catch (_) {
        y = NaN;
      }

      if (!Number.isFinite(y)) {
        setStatus('Cannot place a stem: output is undefined at this x-value.', 'error');
        return;
      }

      stems.push({ x, y });
      setStatus(`Added stem at (${format2(x)}, ${format2(y)}).`, 'success');
      draw();
    }

    function handlePointerDown(event) {
      const p = clientToCanvas(event.clientX, event.clientY);
      const boxes = draw();

      if (inRect(p, boxes.function)) {
        addStemAtCurrentX();
        return;
      }

      if (inRect(p, boxes.input) || inRect(p, boxes.output)) {
        dragState = {
          pointerId: event.pointerId,
          offset: p.x - xToPx(machine.x)
        };
        canvas.setPointerCapture(event.pointerId);
      }
    }

    function handlePointerMove(event) {
      const p = clientToCanvas(event.clientX, event.clientY);

      if (dragState && dragState.pointerId === event.pointerId) {
        const xPx = p.x - dragState.offset;
        const boundedPx = clamp(xPx, xToPx(domain.xMin), xToPx(domain.xMax));
        machine.x = clamp(pxToX(boundedPx), domain.xMin, domain.xMax);
        updateReadout();
        draw();
        return;
      }

      const newHoverStemIndex = getStemIndexAtPoint(p);
      if (newHoverStemIndex !== hoverStemIndex) {
        hoverStemIndex = newHoverStemIndex;
        draw();
      }
    }

    function handlePointerUp(event) {
      if (!dragState || dragState.pointerId !== event.pointerId) return;
      dragState = null;
      canvas.releasePointerCapture(event.pointerId);
    }

    function handlePointerLeave() {
      if (hoverStemIndex !== -1) {
        hoverStemIndex = -1;
        draw();
      }
    }

    function applyRule() {
      const ruleText = ruleInput.value.trim();
      if (ruleText === '') {
        setStatus('Please enter a transformation rule.', 'error');
        return;
      }

      try {
        const tokens = tokenize(ruleText);
        const variableName = extractSingleVariable(tokens);
        const rpn = toRpn(tokens);

        machine.ruleText = ruleText;
        machine.variable = variableName;
        machine.rpn = rpn;
        machine.transformationName = getTransformationName();
        appliedDisplayState.transformationName = machine.transformationName;
        appliedDisplayState.ruleText = machine.ruleText;

        updateGraphRuleBox();
        updateReadout();
        draw();
        setStatus(`Variable: ${variableName}`, 'success');
      } catch (error) {
        setStatus(error.message || 'Could not parse transformation rule.', 'error');
      }
    }

    function resetAll() {
      stems = [];
      hoverStemIndex = -1;
      machine.x = 0;
      dragState = null;
      applyRule();
      setStatus('Reset complete. Stems cleared and stack returned to x = 0.', 'info');
    }

    function initialize() {
      updateGraphRuleBox();
      applyRule();
      draw();
      updateReadout();

      showFunctionLine = false;
      graphVisibilityToggle.checked = false;
      graphVisibilityToggle.addEventListener('change', () => {
        showFunctionLine = graphVisibilityToggle.checked;
        draw();
      });

      canvas.addEventListener('pointerdown', handlePointerDown);
      canvas.addEventListener('pointermove', handlePointerMove);
      canvas.addEventListener('pointerup', handlePointerUp);
      canvas.addEventListener('pointercancel', handlePointerUp);
      canvas.addEventListener('pointerleave', handlePointerLeave);

      transformationNameInput.addEventListener('input', () => {
        machine.transformationName = getTransformationName();
        draw();
      });
    }

    applyBtn.addEventListener('click', applyRule);
    resetBtn.addEventListener('click', resetAll);

    initialize();
  </script>
</body>
</html>
