<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Area Models: Rectangle, Triangle, Trapezoid</title>
  <style>
    :root {
      --bg: #f6f8fc;
      --card: #ffffff;
      --ink: #1f2937;
      --muted: #6b7280;
      --line: #d1d5db;
      --primary: #2563eb;
      --primary-soft: #dbeafe;
      --accent: #0f766e;
      --canvas-bg: #ffffff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--ink);
      background: linear-gradient(160deg, #f8fafc 0%, #eef2ff 100%);
      min-height: 100vh;
    }

    .page {
      max-width: 1200px;
      margin: 24px auto;
      padding: 0 16px;
    }

    .header {
      margin-bottom: 16px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 1.7rem;
      letter-spacing: 0.2px;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 0.98rem;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(520px, 1fr) 360px;
      gap: 16px;
      align-items: stretch;
    }

    .card {
      background: var(--card);
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      box-shadow: 0 8px 22px rgba(15, 23, 42, 0.06);
    }

    .canvas-wrap {
      padding: 14px;
      display: flex;
      min-height: 620px;
    }

    #shapeCanvas {
      width: 100%;
      height: 100%;
      border-radius: 10px;
      border: 1px solid #e5e7eb;
      background: var(--canvas-bg);
      display: block;
      touch-action: none;
      cursor: crosshair;
    }

    .panel {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .section-title {
      margin: 0 0 8px;
      font-size: 0.95rem;
      color: #334155;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .shape-buttons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .shape-btn {
      appearance: none;
      border: 1px solid var(--line);
      background: #fff;
      color: #1f2937;
      border-radius: 10px;
      padding: 9px 8px;
      font-size: 0.92rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 140ms ease;
    }

    .shape-btn:hover {
      border-color: #93c5fd;
      transform: translateY(-1px);
    }

    .shape-btn.active {
      background: var(--primary-soft);
      border-color: var(--primary);
      color: #1e3a8a;
      box-shadow: inset 0 0 0 1px rgba(37, 99, 235, 0.18);
    }

    .toggle-row {
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 10px 12px;
      background: #fff;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .toggle-row label {
      font-size: 0.93rem;
      font-weight: 600;
      color: #0f172a;
    }

    .toggle-row input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--primary);
      cursor: pointer;
    }

    .formula-box,
    .area-box {
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 10px 12px;
      background: #f9fafb;
    }

    .formula {
      font-size: 1.05rem;
      font-weight: 600;
      color: #0f172a;
      margin: 2px 0 0;
    }

    .area-value {
      font-size: 1.45rem;
      font-weight: 700;
      color: var(--accent);
      margin-top: 4px;
    }

    .controls {
      display: grid;
      gap: 10px;
    }

    .control-row {
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 10px;
      background: #fff;
    }

    .control-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      gap: 8px;
    }

    .var-label {
      font-weight: 700;
      font-size: 1rem;
      color: #0f172a;
    }

    .num-input {
      width: 88px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      padding: 6px 8px;
      font-size: 0.95rem;
      text-align: right;
    }

    .slider {
      width: 100%;
      accent-color: var(--primary);
      cursor: pointer;
    }

    .reset-btn {
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      background: #fff;
      font-weight: 600;
      padding: 9px 10px;
      cursor: pointer;
      transition: all 140ms ease;
    }

    .reset-btn:hover {
      border-color: #93c5fd;
      background: #eff6ff;
    }

    @media (max-width: 980px) {
      .layout {
        grid-template-columns: 1fr;
      }
      .canvas-wrap {
        min-height: 440px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="header">
      <h1>Interactive Area Models</h1>
      <p class="subtitle">Adjust variables to explore how area changes for rectangles, triangles, and trapezoids.</p>
    </header>

    <section class="layout">
      <div class="card canvas-wrap">
        <canvas id="shapeCanvas" aria-label="Geometry drawing canvas"></canvas>
      </div>

      <aside class="card panel">
        <section>
          <h2 class="section-title">Choose Shape</h2>
          <div class="shape-buttons" id="shapeButtons"></div>
        </section>

        <section class="toggle-row">
          <label for="fixedBackgroundToggle">Fixed background size</label>
          <input id="fixedBackgroundToggle" type="checkbox" checked />
        </section>

        <section>
          <h2 class="section-title">Area Formula</h2>
          <div class="formula-box">
            <div id="formulaText" class="formula"></div>
          </div>
        </section>

        <section>
          <h2 class="section-title">Variables</h2>
          <div id="controls" class="controls"></div>
        </section>

        <button id="resetBtn" class="reset-btn" type="button">Reset Current Shape</button>

        <section>
          <h2 class="section-title">Area</h2>
          <div class="area-box">
            <div id="areaText" class="area-value"></div>
          </div>
        </section>
      </aside>
    </section>
  </main>

  <script>
    // ---------- State ----------
    const SHAPES = {
      rectangle: {
        label: "Rectangle",
        formula: "A = b×h",
        vars: {
          b: { label: "b", min: 2, max: 30, step: 1, default: 12 },
          h: { label: "h", min: 2, max: 24, step: 1, default: 8 }
        }
      },
      triangle: {
        label: "Triangle",
        formula: "A = (b×h)/2",
        vars: {
          b: { label: "b", min: 2, max: 30, step: 1, default: 14 },
          h: { label: "h", min: 2, max: 24, step: 1, default: 9 }
        }
      },
      trapezoid: {
        label: "Trapezoid",
        formula: "A = ((a+b)×h)/2",
        vars: {
          a: { label: "a", min: 2, max: 26, step: 1, default: 10 },
          b: { label: "b", min: 4, max: 32, step: 1, default: 18 },
          h: { label: "h", min: 2, max: 22, step: 1, default: 8 }
        }
      }
    };

    const appState = {
      currentShape: "rectangle",
      fixedBackground: true,
      values: Object.fromEntries(
        Object.entries(SHAPES).map(([shapeKey, shapeCfg]) => {
          const defaults = Object.fromEntries(
            Object.entries(shapeCfg.vars).map(([key, cfg]) => [key, cfg.default])
          );
          return [shapeKey, defaults];
        })
      )
    };

    const interactionState = {
      activeHandleId: null,
      hoverHandleId: null,
      pointerId: null,
      dragState: null
    };

    const viewState = {
      lastGeometry: null
    };

    // ---------- DOM ----------
    const canvas = document.getElementById("shapeCanvas");
    const ctx = canvas.getContext("2d");
    const shapeButtonsEl = document.getElementById("shapeButtons");
    const controlsEl = document.getElementById("controls");
    const formulaTextEl = document.getElementById("formulaText");
    const areaTextEl = document.getElementById("areaText");
    const resetBtn = document.getElementById("resetBtn");
    const fixedBackgroundToggle = document.getElementById("fixedBackgroundToggle");

    // ---------- Utility ----------
    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function resizeCanvasToDisplaySize() {
      const ratio = window.devicePixelRatio || 1;
      const rect = canvas.getBoundingClientRect();
      const width = Math.max(320, Math.floor(rect.width));
      const height = Math.max(320, Math.floor(rect.height));
      if (canvas.width !== Math.floor(width * ratio) || canvas.height !== Math.floor(height * ratio)) {
        canvas.width = Math.floor(width * ratio);
        canvas.height = Math.floor(height * ratio);
        ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
      }
      return { width, height };
    }

    function formatArea(value) {
      return Number.isInteger(value) ? String(value) : value.toFixed(2).replace(/\.00$/, "");
    }

    function getMaxFixedScale(shape, W, H) {
      const margin = 80;
      const usableW = W - margin * 2;
      const usableH = H - margin * 2;
      const vars = SHAPES[shape].vars;

      if (shape === "rectangle") {
        return Math.min(usableW / vars.b.max, usableH / vars.h.max);
      }
      if (shape === "triangle") {
        return Math.min(usableW / vars.b.max, usableH / vars.h.max);
      }
      const widthUnits = Math.max(vars.a.max, vars.b.max) + Math.abs(vars.b.max - vars.a.max) * 0.35;
      return Math.min(usableW / widthUnits, usableH / vars.h.max);
    }

    function getShapeLayout(shape, v, W, H) {
      const margin = 80;
      const usableW = W - margin * 2;
      const usableH = H - margin * 2;
      let scale;

      if (appState.fixedBackground) {
        scale = getMaxFixedScale(shape, W, H);
      } else if (shape === "trapezoid") {
        const widthUnits = Math.max(v.a, v.b) + Math.abs(v.b - v.a) * 0.35;
        scale = Math.min(usableW / widthUnits, usableH / v.h);
      } else {
        scale = Math.min(usableW / v.b, usableH / v.h);
      }

      return { margin, scale, usableW, usableH, W, H };
    }

    function toCanvasPoint(event) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: event.clientX - rect.left,
        y: event.clientY - rect.top
      };
    }

    // ---------- Area Calculation ----------
    function calcArea(shape, v) {
      if (shape === "rectangle") return v.b * v.h;
      if (shape === "triangle") return (v.b * v.h) / 2;
      if (shape === "trapezoid") return ((v.a + v.b) * v.h) / 2;
      return 0;
    }

    // ---------- Drawing Helpers ----------
    function drawDimLine(x1, y1, x2, y2, label, offset = 16) {
      ctx.save();
      ctx.strokeStyle = "#334155";
      ctx.fillStyle = "#0f172a";
      ctx.lineWidth = 1.4;
      ctx.font = "600 16px Inter, sans-serif";

      const vx = x2 - x1;
      const vy = y2 - y1;
      const len = Math.hypot(vx, vy) || 1;
      const nx = -vy / len;
      const ny = vx / len;

      const sx1 = x1 + nx * offset;
      const sy1 = y1 + ny * offset;
      const sx2 = x2 + nx * offset;
      const sy2 = y2 + ny * offset;

      ctx.beginPath();
      ctx.moveTo(sx1, sy1);
      ctx.lineTo(sx2, sy2);
      ctx.stroke();

      const cap = 5;
      const ang = Math.atan2(sy2 - sy1, sx2 - sx1);
      [
        [sx1, sy1, ang + Math.PI],
        [sx2, sy2, ang]
      ].forEach(([x, y, dir]) => {
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(x + Math.cos(dir + 0.45) * cap, y + Math.sin(dir + 0.45) * cap);
        ctx.moveTo(x, y);
        ctx.lineTo(x + Math.cos(dir - 0.45) * cap, y + Math.sin(dir - 0.45) * cap);
        ctx.stroke();
      });

      const mx = (sx1 + sx2) / 2;
      const my = (sy1 + sy2) / 2;
      ctx.fillText(label, mx - 5, my - 6);
      ctx.restore();
    }

    function drawHeightMarker(xBase, yTop, yBottom, label = "h") {
      ctx.save();
      ctx.strokeStyle = "#9333ea";
      ctx.fillStyle = "#6b21a8";
      ctx.lineWidth = 1.6;
      ctx.setLineDash([6, 5]);
      ctx.beginPath();
      ctx.moveTo(xBase, yTop);
      ctx.lineTo(xBase, yBottom);
      ctx.stroke();
      ctx.setLineDash([]);

      const s = 10;
      ctx.beginPath();
      ctx.moveTo(xBase, yBottom);
      ctx.lineTo(xBase + s, yBottom);
      ctx.lineTo(xBase + s, yBottom - s);
      ctx.stroke();

      ctx.font = "600 16px Inter, sans-serif";
      ctx.fillText(label, xBase + 10, (yTop + yBottom) / 2 - 4);
      ctx.restore();
    }

    function drawHandles(handles) {
      handles.forEach((handle) => {
        const isActive = interactionState.activeHandleId === handle.id;
        const isHover = interactionState.hoverHandleId === handle.id;
        const radius = isActive ? 8 : 7;

        ctx.save();
        ctx.beginPath();
        ctx.arc(handle.x, handle.y, radius, 0, Math.PI * 2);
        ctx.fillStyle = isActive ? "#1d4ed8" : isHover ? "#60a5fa" : "#ffffff";
        ctx.fill();
        ctx.lineWidth = 2.4;
        ctx.strokeStyle = isActive ? "#0f172a" : "#2563eb";
        ctx.stroke();
        ctx.restore();
      });
    }

    // ---------- Shape Drawing + Geometry ----------
    function drawRectangle(v, layout) {
      const w = v.b * layout.scale;
      const h = v.h * layout.scale;
      const x = (layout.W - w) / 2;
      const y = (layout.H - h) / 2;

      ctx.fillStyle = "rgba(37,99,235,0.16)";
      ctx.strokeStyle = "#1d4ed8";
      ctx.lineWidth = 2.2;
      ctx.beginPath();
      ctx.rect(x, y, w, h);
      ctx.fill();
      ctx.stroke();

      drawDimLine(x, y + h, x + w, y + h, "b", 22);
      drawDimLine(x, y + h, x, y, "h", -22);

      return {
        shape: "rectangle",
        scale: layout.scale,
        points: {
          tl: { x, y },
          tr: { x: x + w, y },
          br: { x: x + w, y: y + h },
          bl: { x, y: y + h }
        },
        handles: [
          { id: "tl", x, y },
          { id: "tr", x: x + w, y },
          { id: "br", x: x + w, y: y + h },
          { id: "bl", x, y: y + h }
        ]
      };
    }

    function drawTriangle(v, layout) {
      const bpx = v.b * layout.scale;
      const hpx = v.h * layout.scale;

      const xLeft = (layout.W - bpx) / 2;
      const yBase = (layout.H + hpx) / 2;
      const xRight = xLeft + bpx;
      const xApex = xLeft + bpx * 0.68;
      const yApex = yBase - hpx;

      ctx.fillStyle = "rgba(14,116,144,0.18)";
      ctx.strokeStyle = "#0f766e";
      ctx.lineWidth = 2.2;
      ctx.beginPath();
      ctx.moveTo(xLeft, yBase);
      ctx.lineTo(xRight, yBase);
      ctx.lineTo(xApex, yApex);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();

      drawDimLine(xLeft, yBase, xRight, yBase, "b", 22);
      drawHeightMarker(xApex, yApex, yBase, "h");

      return {
        shape: "triangle",
        scale: layout.scale,
        points: {
          left: { x: xLeft, y: yBase },
          right: { x: xRight, y: yBase },
          apex: { x: xApex, y: yApex },
          yBase
        },
        handles: [
          { id: "left", x: xLeft, y: yBase },
          { id: "right", x: xRight, y: yBase },
          { id: "apex", x: xApex, y: yApex }
        ]
      };
    }

    function drawTrapezoid(v, layout) {
      const topW = v.a * layout.scale;
      const botW = v.b * layout.scale;
      const hpx = v.h * layout.scale;

      const cx = layout.W / 2;
      const yTop = (layout.H - hpx) / 2;
      const yBot = yTop + hpx;

      const xTopLeft = cx - topW / 2;
      const xTopRight = cx + topW / 2;
      const xBotLeft = cx - botW / 2;
      const xBotRight = cx + botW / 2;

      ctx.fillStyle = "rgba(234,88,12,0.17)";
      ctx.strokeStyle = "#c2410c";
      ctx.lineWidth = 2.2;
      ctx.beginPath();
      ctx.moveTo(xTopLeft, yTop);
      ctx.lineTo(xTopRight, yTop);
      ctx.lineTo(xBotRight, yBot);
      ctx.lineTo(xBotLeft, yBot);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();

      drawDimLine(xTopLeft, yTop, xTopRight, yTop, "a", -20);
      drawDimLine(xBotLeft, yBot, xBotRight, yBot, "b", 22);

      const xH = xTopLeft - 24;
      drawHeightMarker(xH, yTop, yBot, "h");

      ctx.save();
      ctx.strokeStyle = "#a78bfa";
      ctx.lineWidth = 1;
      ctx.setLineDash([4, 5]);
      ctx.beginPath();
      ctx.moveTo(xH, yTop);
      ctx.lineTo(xTopLeft, yTop);
      ctx.moveTo(xH, yBot);
      ctx.lineTo(xBotLeft, yBot);
      ctx.stroke();
      ctx.restore();

      return {
        shape: "trapezoid",
        scale: layout.scale,
        points: {
          tl: { x: xTopLeft, y: yTop },
          tr: { x: xTopRight, y: yTop },
          br: { x: xBotRight, y: yBot },
          bl: { x: xBotLeft, y: yBot }
        },
        handles: [
          { id: "tl", x: xTopLeft, y: yTop },
          { id: "tr", x: xTopRight, y: yTop },
          { id: "br", x: xBotRight, y: yBot },
          { id: "bl", x: xBotLeft, y: yBot }
        ]
      };
    }

    // ---------- Rendering ----------
    function renderShapeButtons() {
      shapeButtonsEl.innerHTML = "";
      Object.entries(SHAPES).forEach(([shapeKey, cfg]) => {
        const btn = document.createElement("button");
        btn.className = `shape-btn ${appState.currentShape === shapeKey ? "active" : ""}`;
        btn.type = "button";
        btn.textContent = cfg.label;
        btn.addEventListener("click", () => {
          appState.currentShape = shapeKey;
          interactionState.activeHandleId = null;
          interactionState.hoverHandleId = null;
          renderAll();
        });
        shapeButtonsEl.appendChild(btn);
      });
    }

    function createControlRow(varKey, cfg, value) {
      const row = document.createElement("div");
      row.className = "control-row";
      row.dataset.varKey = varKey;

      const top = document.createElement("div");
      top.className = "control-top";

      const label = document.createElement("span");
      label.className = "var-label";
      label.textContent = cfg.label;

      const num = document.createElement("input");
      num.className = "num-input";
      num.type = "number";
      num.min = cfg.min;
      num.max = cfg.max;
      num.step = cfg.step;
      num.value = value;

      top.appendChild(label);
      top.appendChild(num);

      const slider = document.createElement("input");
      slider.className = "slider";
      slider.type = "range";
      slider.min = cfg.min;
      slider.max = cfg.max;
      slider.step = cfg.step;
      slider.value = value;

      function updateFrom(nextVal) {
        const bounded = clamp(Number(nextVal) || cfg.min, cfg.min, cfg.max);
        appState.values[appState.currentShape][varKey] = bounded;
        num.value = bounded;
        slider.value = bounded;
        renderCanvasAndArea();
      }

      num.addEventListener("input", () => updateFrom(num.value));
      slider.addEventListener("input", () => updateFrom(slider.value));

      row.appendChild(top);
      row.appendChild(slider);
      return row;
    }

    function renderControls() {
      controlsEl.innerHTML = "";
      const shapeCfg = SHAPES[appState.currentShape];
      const vals = appState.values[appState.currentShape];

      Object.entries(shapeCfg.vars).forEach(([varKey, cfg]) => {
        controlsEl.appendChild(createControlRow(varKey, cfg, vals[varKey]));
      });
    }

    function syncControlValues() {
      const vals = appState.values[appState.currentShape];
      controlsEl.querySelectorAll(".control-row").forEach((row) => {
        const varKey = row.dataset.varKey;
        if (!varKey || !(varKey in vals)) return;
        const val = vals[varKey];
        const num = row.querySelector(".num-input");
        const slider = row.querySelector(".slider");
        if (num) num.value = val;
        if (slider) slider.value = val;
      });
    }

    function renderFormula() {
      formulaTextEl.textContent = SHAPES[appState.currentShape].formula;
    }

    function renderCanvasAndArea() {
      const { width: W, height: H } = resizeCanvasToDisplaySize();
      const shape = appState.currentShape;
      const vals = appState.values[shape];
      const layout = getShapeLayout(shape, vals, W, H);

      ctx.clearRect(0, 0, W, H);

      ctx.save();
      ctx.strokeStyle = "#f1f5f9";
      ctx.lineWidth = 1;
      for (let x = 0; x <= W; x += 36) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, H);
        ctx.stroke();
      }
      for (let y = 0; y <= H; y += 36) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(W, y);
        ctx.stroke();
      }
      ctx.restore();

      let geometry;
      if (shape === "rectangle") geometry = drawRectangle(vals, layout);
      if (shape === "triangle") geometry = drawTriangle(vals, layout);
      if (shape === "trapezoid") geometry = drawTrapezoid(vals, layout);

      if (geometry) {
        viewState.lastGeometry = geometry;
        drawHandles(geometry.handles);
      }

      const area = calcArea(shape, vals);
      areaTextEl.textContent = `A = ${formatArea(area)} units²`;
    }

    function resetCurrentShape() {
      const shape = appState.currentShape;
      Object.entries(SHAPES[shape].vars).forEach(([k, cfg]) => {
        appState.values[shape][k] = cfg.default;
      });
      renderAll();
    }

    function renderAll() {
      fixedBackgroundToggle.checked = appState.fixedBackground;
      renderShapeButtons();
      renderControls();
      renderFormula();
      renderCanvasAndArea();
    }

    // ---------- Drag Interaction ----------
    function getHandleAtPoint(point) {
      const geometry = viewState.lastGeometry;
      if (!geometry) return null;
      let match = null;
      let nearest = Infinity;
      geometry.handles.forEach((h) => {
        const d = Math.hypot(point.x - h.x, point.y - h.y);
        if (d <= 12 && d < nearest) {
          nearest = d;
          match = h;
        }
      });
      return match;
    }

    function updateRectangleByHandle(handleId, point, geometry) {
      const vals = appState.values.rectangle;
      const cfg = SHAPES.rectangle.vars;
      const p = geometry.points;
      const boundsPad = 24;

      const clampedX = clamp(point.x, boundsPad, geometry.scale * cfg.b.max + geometry.points.tl.x + 2000);
      const clampedY = clamp(point.y, boundsPad, canvas.height + 2000);
      const map = {
        tl: p.br,
        tr: p.bl,
        br: p.tl,
        bl: p.tr
      };
      const anchor = map[handleId];
      const nextB = clamp(Math.abs(clampedX - anchor.x) / geometry.scale, cfg.b.min, cfg.b.max);
      const nextH = clamp(Math.abs(clampedY - anchor.y) / geometry.scale, cfg.h.min, cfg.h.max);
      vals.b = nextB;
      vals.h = nextH;
    }

    function updateTriangleByHandle(handleId, point, geometry) {
      const vals = appState.values.triangle;
      const cfg = SHAPES.triangle.vars;
      const p = geometry.points;

      if (handleId === "left") {
        vals.b = clamp(Math.abs(p.right.x - point.x) / geometry.scale, cfg.b.min, cfg.b.max);
      } else if (handleId === "right") {
        vals.b = clamp(Math.abs(point.x - p.left.x) / geometry.scale, cfg.b.min, cfg.b.max);
      } else if (handleId === "apex") {
        vals.h = clamp((p.yBase - point.y) / geometry.scale, cfg.h.min, cfg.h.max);
      }
    }

    function updateTrapezoidByHandle(handleId, point, geometry) {
      const vals = appState.values.trapezoid;
      const cfg = SHAPES.trapezoid.vars;
      const p = geometry.points;

      if (handleId === "tl") {
        vals.a = clamp(Math.abs(p.tr.x - point.x) / geometry.scale, cfg.a.min, cfg.a.max);
        vals.h = clamp((p.bl.y - point.y) / geometry.scale, cfg.h.min, cfg.h.max);
      } else if (handleId === "tr") {
        vals.a = clamp(Math.abs(point.x - p.tl.x) / geometry.scale, cfg.a.min, cfg.a.max);
        vals.h = clamp((p.br.y - point.y) / geometry.scale, cfg.h.min, cfg.h.max);
      } else if (handleId === "bl") {
        vals.b = clamp(Math.abs(p.br.x - point.x) / geometry.scale, cfg.b.min, cfg.b.max);
        vals.h = clamp((point.y - p.tl.y) / geometry.scale, cfg.h.min, cfg.h.max);
      } else if (handleId === "br") {
        vals.b = clamp(Math.abs(point.x - p.bl.x) / geometry.scale, cfg.b.min, cfg.b.max);
        vals.h = clamp((point.y - p.tr.y) / geometry.scale, cfg.h.min, cfg.h.max);
      }
    }

    function updateShapeFromDrag(point) {
      const geometry = viewState.lastGeometry;
      if (!geometry || !interactionState.activeHandleId) return;

      const clampedPoint = {
        x: clamp(point.x, 24, canvas.clientWidth - 24),
        y: clamp(point.y, 24, canvas.clientHeight - 24)
      };

      if (geometry.shape === "rectangle") {
        updateRectangleByHandle(interactionState.activeHandleId, clampedPoint, geometry);
      }
      if (geometry.shape === "triangle") {
        updateTriangleByHandle(interactionState.activeHandleId, clampedPoint, geometry);
      }
      if (geometry.shape === "trapezoid") {
        updateTrapezoidByHandle(interactionState.activeHandleId, clampedPoint, geometry);
      }

      syncControlValues();
      renderCanvasAndArea();
    }

    function onPointerDown(event) {
      const point = toCanvasPoint(event);
      const handle = getHandleAtPoint(point);
      if (!handle) return;

      interactionState.activeHandleId = handle.id;
      interactionState.pointerId = event.pointerId;
      canvas.setPointerCapture(event.pointerId);
      updateShapeFromDrag(point);
      renderCanvasAndArea();
    }

    function onPointerMove(event) {
      const point = toCanvasPoint(event);
      if (interactionState.activeHandleId && event.pointerId === interactionState.pointerId) {
        updateShapeFromDrag(point);
        return;
      }

      const handle = getHandleAtPoint(point);
      interactionState.hoverHandleId = handle ? handle.id : null;
      canvas.style.cursor = handle ? "grab" : "crosshair";
      renderCanvasAndArea();
    }

    function onPointerUp(event) {
      if (interactionState.pointerId !== null && event.pointerId === interactionState.pointerId) {
        canvas.releasePointerCapture(event.pointerId);
      }
      interactionState.activeHandleId = null;
      interactionState.pointerId = null;
      canvas.style.cursor = interactionState.hoverHandleId ? "grab" : "crosshair";
      renderCanvasAndArea();
    }

    function onPointerLeave() {
      if (!interactionState.activeHandleId) {
        interactionState.hoverHandleId = null;
        canvas.style.cursor = "crosshair";
        renderCanvasAndArea();
      }
    }

    // ---------- Events ----------
    resetBtn.addEventListener("click", resetCurrentShape);
    fixedBackgroundToggle.addEventListener("change", () => {
      appState.fixedBackground = fixedBackgroundToggle.checked;
      renderCanvasAndArea();
    });
    canvas.addEventListener("pointerdown", onPointerDown);
    canvas.addEventListener("pointermove", onPointerMove);
    canvas.addEventListener("pointerup", onPointerUp);
    canvas.addEventListener("pointercancel", onPointerUp);
    canvas.addEventListener("pointerleave", onPointerLeave);
    window.addEventListener("resize", renderCanvasAndArea);

    // ---------- Init ----------
    renderAll();
  </script>
</body>
</html>
