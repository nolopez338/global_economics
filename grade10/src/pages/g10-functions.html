<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Functions as a Machine</title>
  <style>
    :root {
      --green: #2f9e44;
      --green-dark: #1f6f30;
      --purple: #7048e8;
      --purple-dark: #4b2da6;
      --red: #e03131;
      --red-dark: #a61e1e;
      --ink: #1f2937;
      --soft: #f5f3ff;
      --line: #d1d5db;
      --panel: #ffffff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--ink);
      background: linear-gradient(180deg, #f8fafc, #eef2ff);
      min-height: 100vh;
      line-height: 1.45;
    }

    .page {
      max-width: 1024px;
      margin: 0 auto;
      padding: 1.25rem;
    }

    h1 {
      margin: 0 0 0.5rem;
      font-size: clamp(1.7rem, 2.5vw, 2.4rem);
      color: #312e81;
    }

    .intro {
      margin: 0 0 1rem;
      font-size: 1.05rem;
      color: #4338ca;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: 0 8px 24px rgba(37, 99, 235, 0.08);
      padding: 1rem;
      margin-bottom: 1rem;
    }

    .controls {
      display: grid;
      grid-template-columns: minmax(280px, 1.1fr) minmax(240px, 1fr);
      gap: 0.85rem;
      align-items: start;
    }

    .field label {
      display: block;
      margin-bottom: 0.35rem;
      font-weight: 600;
    }

    .field input {
      width: 100%;
      border: 2px solid #c7d2fe;
      border-radius: 10px;
      padding: 0.65rem 0.75rem;
      font-size: 1rem;
      font-family: inherit;
    }

    .field input:focus {
      outline: none;
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.16);
    }

    .field input[type="checkbox"] {
      width: auto;
      transform: scale(1.1);
      accent-color: #4f46e5;
    }

    .input-label-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      margin-bottom: 0.35rem;
      flex-wrap: wrap;
    }

    .input-label-row label {
      margin: 0;
    }

    .inline-toggle {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      font-weight: 600;
      white-space: nowrap;
    }

    .inline-toggle input[type="checkbox"] {
      margin: 0;
    }

    .input-with-slider {
      display: grid;
      gap: 0.45rem;
      align-items: start;
    }

    .slider-row {
      width: 100%;
      display: grid;
      grid-template-columns: minmax(56px, 72px) minmax(0, 1fr) minmax(56px, 72px) auto;
      align-items: center;
      gap: 0.45rem;
    }

    .slider-row input[type="number"] {
      padding: 0.5rem 0.55rem;
      text-align: center;
    }

    .slider-autoplay-btn {
      min-width: 44px;
      width: 44px;
      padding: 0.5rem 0.4rem;
      border-radius: 8px;
      font-size: 1rem;
      background: #6366f1;
      color: #fff;
      line-height: 1;
    }

    .slider-shell {
      min-height: 38px;
      display: flex;
      align-items: center;
      width: 100%;
    }

    .slider-shell input[type="range"] {
      width: 100%;
      cursor: pointer;
      padding: 0;
      border: none;
      border-radius: 0;
      box-shadow: none;
    }

    .slider-shell.is-hidden .value-slider {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      min-height: 46px;
    }

    .checkbox-row label {
      margin: 0;
      font-weight: 600;
    }

    .button-row {
      display: flex;
      gap: 0.65rem;
      flex-wrap: nowrap;
    }

    button {
      cursor: pointer;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      padding: 0.65rem 1rem;
      min-width: 110px;
    }

    #playBtn {
      background: #4f46e5;
      color: white;
    }

    #resetBtn {
      background: #e5e7eb;
      color: #111827;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .status {
      min-height: 1.6rem;
      margin-top: 0.5rem;
      font-size: 0.98rem;
      font-weight: 600;
    }

    .status.error { color: #b91c1c; }
    .status.info { color: #3730a3; }
    .status.success { color: #166534; }

    .machine-stage {
      margin-top: 0.25rem;
      position: relative;
      min-height: 300px;
      border-radius: 14px;
      border: 2px dashed #c7d2fe;
      background: #f8faff;
      padding: 1rem;
      overflow: hidden;
    }

    .flow-label {
      text-align: center;
      font-size: 1.05rem;
      margin-bottom: 0.7rem;
      color: #312e81;
      font-weight: 700;
    }

    .lane {
      position: relative;
      height: 170px;
    }

    .anchor {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 130px;
      height: 88px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-weight: 800;
      font-size: 1.05rem;
      padding: 0.4rem;
      color: #fff;
    }

    .anchor.left {
      left: 12%;
      background: linear-gradient(145deg, #40c057, var(--green));
      box-shadow: 0 10px 16px rgba(47, 158, 68, 0.28);
      z-index: 2;
    }

    .anchor.middle {
      left: 50%;
      width: 220px;
      height: 112px;
      background: linear-gradient(145deg, #845ef7, var(--purple));
      box-shadow: 0 10px 18px rgba(112, 72, 232, 0.28);
      border: 2px solid rgba(255, 255, 255, 0.45);
      flex-direction: column;
      gap: 0.3rem;
      padding: 0.65rem;
      z-index: 10;
    }

    .anchor.middle .machine-rule {
      font-size: 1.02rem;
      line-height: 1.15;
      font-weight: 900;
      max-width: 100%;
      overflow-wrap: anywhere;
    }

    .anchor.right {
      left: 88%;
      background: linear-gradient(145deg, #fa5252, var(--red));
      box-shadow: 0 10px 16px rgba(224, 49, 49, 0.3);
      z-index: 2;
    }

    .moving-box {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 110px;
      height: 72px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 1.15rem;
      font-weight: 900;
      color: #fff;
      opacity: 0;
      transition: left 2s ease-in-out, opacity 0.4s ease;
      z-index: 3;
      padding: 0.2rem;
    }

    .moving-box.input-token {
      background: linear-gradient(145deg, #40c057, var(--green-dark));
      left: 12%;
    }

    .moving-box.output-token {
      background: linear-gradient(145deg, #ff6b6b, var(--red-dark));
      left: 50%;
    }

    .moving-box.show { opacity: 1; }
    .moving-box.enter-machine { left: 50%; }
    .moving-box.exit-machine { left: 88%; }

    .steps {
      margin-top: 1rem;
      background: var(--soft);
      border: 1px solid #ddd6fe;
      border-radius: 10px;
      padding: 0.8rem;
    }

    .steps h2 {
      margin: 0 0 0.5rem;
      font-size: 1.1rem;
      color: #4c1d95;
    }

    .steps p {
      margin: 0.33rem 0;
      font-size: 1rem;
    }

    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-weight: 700;
    }

    @media (max-width: 720px) {
      .controls { grid-template-columns: 1fr; }
      .machine-stage { min-height: 340px; }
      .lane { height: 190px; }
      .anchor { width: 105px; height: 70px; font-size: 0.95rem; }
      .anchor.middle { width: 170px; height: 118px; }
      .anchor.middle .machine-rule { font-size: 0.92rem; }
      .moving-box { width: 88px; height: 62px; font-size: 1rem; }
    }
  </style>
</head>
<body>
  <main class="page">
    <h1>Functions</h1>
    <section class="card">
      <div class="controls">
        <div class="field input-with-slider">
          <div class="input-label-row">
            <label for="numberInput">Input number</label>
            <label for="sliderVisibilityToggle" class="inline-toggle">
              <span>Show input slider</span>
              <input id="sliderVisibilityToggle" type="checkbox" checked />
            </label>
          </div>
          <input id="numberInput" type="number" step="0.01" placeholder="e.g., 4.00" aria-describedby="statusMsg" />
          <div class="slider-row">
            <input id="sliderMinInput" type="number" step="0.01" aria-label="Slider minimum" aria-describedby="statusMsg" />
            <div id="sliderShell" class="slider-shell">
              <input id="valueSlider" class="value-slider" type="range" aria-label="Input value slider" />
            </div>
            <input id="sliderMaxInput" type="number" step="0.01" aria-label="Slider maximum" aria-describedby="statusMsg" />
            <button id="sliderSweepBtn" class="slider-autoplay-btn" type="button" aria-label="Autoplay slider sweep">▶</button>
          </div>
          <div class="button-row">
            <button id="playBtn" type="button">Play</button>
            <button id="resetBtn" type="button">Reset</button>
          </div>
        </div>

        <div class="field">
          <div class="input-label-row">
            <label for="ruleInput">Transformation rule</label>
            <label for="automaticToggle" class="inline-toggle">
              <span>Automatic</span>
              <input id="automaticToggle" type="checkbox" checked />
            </label>
          </div>
          <input id="ruleInput" type="text" placeholder="e.g., Number^2 + 3*Number - 1" aria-describedby="statusMsg" />
        </div>
      </div>
      <div id="statusMsg" class="status info" role="status" aria-live="polite">Enter an input number and a polynomial transformation rule, then press Play.</div>
    </section>

    <section class="card machine-stage" aria-label="Function machine animation area">
      <div class="flow-label">input &rarr; function / transformation &rarr; output</div>
      <div class="lane" id="lane">
        <div id="inputAnchor" class="anchor left">Input</div>

        <div class="anchor middle">
          <div class="machine-rule" id="machineRule">f(x)</div>
        </div>

        <div id="outputAnchor" class="anchor right">Output</div>

        <div id="movingInput" class="moving-box input-token" aria-hidden="true"></div>
        <div id="movingOutput" class="moving-box output-token" aria-hidden="true"></div>
      </div>

      <div class="steps" aria-live="polite">
        <h2>Substitution Steps</h2>
        <p id="stepVar">Variable: <span class="mono">-</span></p>
        <p id="stepSub">Substitution: <span class="mono">-</span></p>
        <p id="stepOut">Output: <span class="mono">-</span></p>
      </div>
    </section>
  </main>

  <script>
    const numberInput = document.getElementById('numberInput');
    const ruleInput = document.getElementById('ruleInput');
    const playBtn = document.getElementById('playBtn');
    const resetBtn = document.getElementById('resetBtn');
    const statusMsg = document.getElementById('statusMsg');
    const valueSlider = document.getElementById('valueSlider');
    const sliderMinInput = document.getElementById('sliderMinInput');
    const sliderMaxInput = document.getElementById('sliderMaxInput');
    const sliderVisibilityToggle = document.getElementById('sliderVisibilityToggle');
    const sliderShell = document.getElementById('sliderShell');
    const sliderSweepBtn = document.getElementById('sliderSweepBtn');
    const automaticToggle = document.getElementById('automaticToggle');

    const movingInput = document.getElementById('movingInput');
    const movingOutput = document.getElementById('movingOutput');
    const inputAnchor = document.getElementById('inputAnchor');
    const outputAnchor = document.getElementById('outputAnchor');

    const machineRule = document.getElementById('machineRule');
    const stepVar = document.getElementById('stepVar');
    const stepSub = document.getElementById('stepSub');
    const stepOut = document.getElementById('stepOut');

    let isAnimating = false;
    let autoSweepIntervalId = null;
    const FALLBACK_BOUNDS = { min: 0, max: 10 };
    const AUTO_SWEEP_INTERVAL_MS = 400;

    function setStatus(message, type = 'info') {
      statusMsg.className = `status ${type}`;
      statusMsg.textContent = message;
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function parseNumberOrNull(value) {
      if (value === null || value === undefined) return null;
      const trimmed = String(value).trim();
      if (trimmed === '') return null;
      const parsed = Number(trimmed);
      return Number.isFinite(parsed) ? parsed : null;
    }

    function determineStepValue() {
      return numberInput.step && numberInput.step !== 'any' ? numberInput.step : '0.01';
    }

    function getCurrentBounds() {
      const min = parseNumberOrNull(valueSlider.min) ?? FALLBACK_BOUNDS.min;
      const max = parseNumberOrNull(valueSlider.max) ?? FALLBACK_BOUNDS.max;
      return { min, max };
    }

    function formatToTwoDecimals(value) {
      return Number(value).toFixed(2);
    }

    function setNumberInputValue(value) {
      numberInput.value = formatToTwoDecimals(value);
    }

    function syncSliderToInputValue() {
      const numericValue = parseNumberOrNull(numberInput.value);
      if (numericValue === null) return;
      const { min, max } = getCurrentBounds();
      const clamped = clamp(numericValue, min, max);
      setNumberInputValue(clamped);
      valueSlider.value = formatToTwoDecimals(clamped);
    }

    function syncInputToSliderValue() {
      const sliderValue = parseNumberOrNull(valueSlider.value);
      if (sliderValue === null) return;
      setNumberInputValue(sliderValue);
    }

    function applySliderBounds(nextMin, nextMax) {
      let min = Number.isFinite(nextMin) ? nextMin : FALLBACK_BOUNDS.min;
      let max = Number.isFinite(nextMax) ? nextMax : FALLBACK_BOUNDS.max;

      if (min > max) {
        max = min;
      }

      valueSlider.min = String(min);
      valueSlider.max = String(max);
      sliderMinInput.value = String(min);
      sliderMaxInput.value = String(max);
      syncSliderToInputValue();
      syncAutoSweepButtonState();
    }

    function applyBoundsFromControlInput(changedControl) {
      const current = getCurrentBounds();
      let nextMin = parseNumberOrNull(sliderMinInput.value);
      let nextMax = parseNumberOrNull(sliderMaxInput.value);

      if (nextMin === null) nextMin = current.min;
      if (nextMax === null) nextMax = current.max;

      if (nextMin > nextMax) {
        if (changedControl === 'min') {
          nextMax = nextMin;
          sliderMaxInput.value = String(nextMax);
        } else {
          nextMin = nextMax;
          sliderMinInput.value = String(nextMin);
        }
      }

      applySliderBounds(nextMin, nextMax);
    }

    function setSliderVisibility(isVisible) {
      sliderShell.classList.toggle('is-hidden', !isVisible);
      valueSlider.setAttribute('aria-hidden', String(!isVisible));
    }

    function initValueControls() {
      const stepValue = determineStepValue();
      valueSlider.step = stepValue;
      sliderMinInput.step = stepValue;
      sliderMaxInput.step = stepValue;

      const initialValue = parseNumberOrNull(numberInput.value) ?? FALLBACK_BOUNDS.min;
      const attrMin = parseNumberOrNull(valueSlider.getAttribute('min'));
      const attrMax = parseNumberOrNull(valueSlider.getAttribute('max'));
      const inferredPadding = Math.max(1, Math.abs(initialValue) || 1);

      const initialMin = attrMin ?? (initialValue - inferredPadding);
      const initialMax = attrMax ?? (initialValue + inferredPadding);
      applySliderBounds(initialMin, initialMax);

      numberInput.addEventListener('input', () => {
        syncSliderToInputValue();
        if (isAutomaticMode()) {
          applyImmediateTransformation();
        }
      });
      valueSlider.addEventListener('input', () => {
        syncInputToSliderValue();
        if (isAutomaticMode()) {
          applyImmediateTransformation();
        }
      });
      sliderMinInput.addEventListener('input', () => applyBoundsFromControlInput('min'));
      sliderMaxInput.addEventListener('input', () => applyBoundsFromControlInput('max'));
      sliderVisibilityToggle.addEventListener('change', () => {
        setSliderVisibility(sliderVisibilityToggle.checked);
      });

      setSliderVisibility(sliderVisibilityToggle.checked);
      syncSliderToInputValue();
    }

    function isAutomaticMode() {
      return automaticToggle.checked;
    }

    function stopAutoSweep() {
      if (autoSweepIntervalId !== null) {
        clearInterval(autoSweepIntervalId);
        autoSweepIntervalId = null;
      }
      syncAutoSweepButtonState();
    }

    function syncAutoSweepButtonState() {
      sliderSweepBtn.textContent = autoSweepIntervalId === null ? '▶' : '⏸';
      sliderSweepBtn.title = autoSweepIntervalId === null ? 'Start automatic sweep' : 'Stop automatic sweep';
    }

    function resetAnimation() {
      isAnimating = false;
      playBtn.disabled = false;
      movingInput.className = 'moving-box input-token';
      movingOutput.className = 'moving-box output-token';
      movingInput.textContent = '';
      movingOutput.textContent = '';
      inputAnchor.textContent = 'Input';
      outputAnchor.textContent = 'Output';
      machineRule.textContent = 'f(x)';
      stepVar.innerHTML = 'Variable: <span class="mono">-</span>';
      stepSub.innerHTML = 'Substitution: <span class="mono">-</span>';
      stepOut.innerHTML = 'Output: <span class="mono">-</span>';
      stopAutoSweep();
      setStatus('Enter a number and a polynomial rule, then press Play.', 'info');
    }

    function tokenize(expr) {
      const tokens = [];
      let i = 0;

      while (i < expr.length) {
        const ch = expr[i];

        if (/\s/.test(ch)) { i += 1; continue; }

        if (/[0-9.]/.test(ch)) {
          let start = i;
          let dotCount = 0;
          while (i < expr.length && /[0-9.]/.test(expr[i])) {
            if (expr[i] === '.') dotCount += 1;
            i += 1;
          }
          const raw = expr.slice(start, i);
          if (dotCount > 1 || raw === '.') throw new Error(`Invalid number: ${raw}`);
          tokens.push({ type: 'number', value: Number(raw), raw });
          continue;
        }

        if (/[A-Za-z_]/.test(ch)) {
          let start = i;
          i += 1;
          while (i < expr.length && /[A-Za-z0-9_]/.test(expr[i])) i += 1;
          tokens.push({ type: 'identifier', value: expr.slice(start, i) });
          continue;
        }

        if ('+-*^()'.includes(ch)) {
          tokens.push({ type: 'operator', value: ch });
          i += 1;
          continue;
        }

        throw new Error(`Invalid character: ${ch}`);
      }

      if (tokens.length === 0) throw new Error('Expression cannot be empty.');
      return tokens;
    }

    function toRpn(tokens) {
      const output = [];
      const stack = [];
      const precedence = { '+': 1, '-': 1, '*': 2, '^': 3, 'u-': 4 };
      const rightAssoc = { '^': true, 'u-': true };

      let prevType = 'start';

      for (const token of tokens) {
        if (token.type === 'number' || token.type === 'identifier') {
          output.push(token);
          prevType = token.type;
          continue;
        }

        const op = token.value;

        if (op === '(') {
          stack.push({ type: 'paren', value: op });
          prevType = 'leftParen';
          continue;
        }

        if (op === ')') {
          let foundLeft = false;
          while (stack.length > 0) {
            const top = stack.pop();
            if (top.type === 'paren' && top.value === '(') {
              foundLeft = true;
              break;
            }
            output.push(top);
          }
          if (!foundLeft) throw new Error('Mismatched parentheses.');
          prevType = 'rightParen';
          continue;
        }

        let opVal = op;
        if (op === '-' && (prevType === 'start' || prevType === 'operator' || prevType === 'leftParen')) {
          opVal = 'u-';
        }

        const current = { type: 'operator', value: opVal };

        while (stack.length > 0) {
          const top = stack[stack.length - 1];
          if (top.type !== 'operator') break;
          const topPrec = precedence[top.value];
          const curPrec = precedence[current.value];
          if (
            (rightAssoc[current.value] && curPrec < topPrec) ||
            (!rightAssoc[current.value] && curPrec <= topPrec)
          ) {
            output.push(stack.pop());
          } else {
            break;
          }
        }

        stack.push(current);
        prevType = 'operator';
      }

      while (stack.length > 0) {
        const top = stack.pop();
        if (top.type === 'paren') throw new Error('Mismatched parentheses.');
        output.push(top);
      }

      return output;
    }

    function evaluateRpn(rpn, variableValueMap) {
      const stack = [];

      for (const token of rpn) {
        if (token.type === 'number') {
          stack.push(token.value);
          continue;
        }

        if (token.type === 'identifier') {
          if (!(token.value in variableValueMap)) {
            throw new Error(`Unknown variable: ${token.value}`);
          }
          stack.push(variableValueMap[token.value]);
          continue;
        }

        if (token.type === 'operator') {
          if (token.value === 'u-') {
            if (stack.length < 1) throw new Error('Invalid unary minus usage.');
            const a = stack.pop();
            stack.push(-a);
            continue;
          }

          if (stack.length < 2) throw new Error('Invalid expression structure.');
          const b = stack.pop();
          const a = stack.pop();

          switch (token.value) {
            case '+': stack.push(a + b); break;
            case '-': stack.push(a - b); break;
            case '*': stack.push(a * b); break;
            case '^':
              if (!Number.isInteger(b)) {
                throw new Error('Polynomial exponents must be integers.');
              }
              if (b < 0) {
                throw new Error('Negative exponents are not allowed for this polynomial model.');
              }
              stack.push(a ** b);
              break;
            default:
              throw new Error(`Unsupported operator: ${token.value}`);
          }
        }
      }

      if (stack.length !== 1) throw new Error('Expression could not be evaluated.');
      const result = stack[0];
      if (!Number.isFinite(result)) throw new Error('Result is not finite.');
      return result;
    }

    function extractSingleVariable(tokens) {
      const vars = [...new Set(tokens.filter(t => t.type === 'identifier').map(t => t.value))];
      if (vars.length === 0) {
        throw new Error('Use one variable in the rule, such as x, Number, or value.');
      }
      if (vars.length > 1) {
        throw new Error(`Only one variable is allowed. Found: ${vars.join(', ')}`);
      }
      return vars[0];
    }

    function substituteExpression(expression, variableName, value) {
      const escaped = variableName.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      const pattern = new RegExp(`\\b${escaped}\\b`, 'g');
      return expression.replace(pattern, `(${value})`);
    }

    async function runAnimation(inputValue, ruleText, variableName, outputValue, substituted) {
      isAnimating = true;
      playBtn.disabled = true;

      inputAnchor.textContent = String(inputValue);
      machineRule.textContent = ruleText;
      stepVar.innerHTML = `Variable: <span class="mono">${variableName} = ${inputValue}</span>`;
      stepSub.innerHTML = 'Substitution: <span class="mono">waiting...</span>';
      stepOut.innerHTML = 'Output: <span class="mono">waiting...</span>';

      movingInput.textContent = String(inputValue);
      movingInput.classList.add('show');
      setStatus('Input appears on the left.', 'info');
      await sleep(600);

      movingInput.classList.add('enter-machine');
      setStatus('Input is moving into the function machine...', 'info');
      await sleep(2200);

      setStatus('Inside the machine: applying the rule to the input.', 'info');
      stepSub.innerHTML = `Substitution: <span class="mono">${ruleText} &rarr; ${substituted}</span>`;
      machineRule.textContent = substituted;
      await sleep(1500);

      movingInput.classList.remove('show');
      movingOutput.textContent = String(outputValue);
      movingOutput.classList.add('show');
      await sleep(250);
      movingOutput.classList.add('exit-machine');
      stepOut.innerHTML = `Output: <span class="mono">f(${inputValue}) = ${outputValue}</span>`;
      setStatus('Transformation!', 'success');
      await sleep(2200);

      machineRule.textContent = ruleText;
      playBtn.disabled = false;
      isAnimating = false;
    }

    function roundForDisplay(value) {
      const rounded = Math.round((value + Number.EPSILON) * 1e10) / 1e10;
      return Number.isInteger(rounded) ? String(rounded) : String(rounded);
    }

    function computeTransformation(ruleText, inputValue) {
      const tokens = tokenize(ruleText);
      const variableName = extractSingleVariable(tokens);
      const rpn = toRpn(tokens);
      const output = evaluateRpn(rpn, { [variableName]: inputValue });
      const displayOutput = roundForDisplay(output);
      const substituted = substituteExpression(ruleText, variableName, inputValue);
      return { variableName, displayOutput, substituted };
    }

    function applyImmediateTransformation() {
      if (isAnimating) return;

      const numValue = parseNumberOrNull(numberInput.value);
      const ruleText = ruleInput.value.trim();

      if (numValue === null) {
        return;
      }
      if (ruleText === '') {
        return;
      }

      const { min, max } = getCurrentBounds();
      const clampedInput = clamp(numValue, min, max);
      setNumberInputValue(clampedInput);
      valueSlider.value = formatToTwoDecimals(clampedInput);

      try {
        const result = computeTransformation(ruleText, clampedInput);

        movingInput.className = 'moving-box input-token';
        movingOutput.className = 'moving-box output-token';
        movingInput.textContent = '';
        movingOutput.textContent = '';

        inputAnchor.textContent = formatToTwoDecimals(clampedInput);
        outputAnchor.textContent = result.displayOutput;
        machineRule.textContent = ruleText;
        stepVar.innerHTML = `Variable: <span class="mono">${result.variableName} = ${formatToTwoDecimals(clampedInput)}</span>`;
        stepSub.innerHTML = `Substitution: <span class="mono">${ruleText} &rarr; ${result.substituted}</span>`;
        stepOut.innerHTML = `Output: <span class="mono">f(${formatToTwoDecimals(clampedInput)}) = ${result.displayOutput}</span>`;
        setStatus('Automatic mode: transformation applied instantly.', 'success');
      } catch (error) {
        setStatus(error.message || 'Could not parse the transformation rule.', 'error');
      }
    }

    function startAutoSweep() {
      stopAutoSweep();

      if (!isAutomaticMode()) {
        setStatus('Turn on Automatic mode to use slider sweep.', 'error');
        return;
      }

      const step = parseNumberOrNull(valueSlider.step) ?? 0.01;
      const safeStep = step > 0 ? step : 0.01;

      autoSweepIntervalId = setInterval(() => {
        const { min, max } = getCurrentBounds();
        const current = parseNumberOrNull(numberInput.value) ?? min;
        const startValue = clamp(current, min, max);
        let next = startValue + safeStep;
        if (next > max + 1e-9) {
          next = min;
        }
        const clampedNext = clamp(next, min, max);
        setNumberInputValue(clampedNext);
        valueSlider.value = formatToTwoDecimals(clampedNext);
        applyImmediateTransformation();
      }, AUTO_SWEEP_INTERVAL_MS);

      syncAutoSweepButtonState();
      setStatus('Automatic slider sweep started.', 'info');
    }

    function toggleAutoSweep() {
      if (autoSweepIntervalId !== null) {
        stopAutoSweep();
        setStatus('Automatic slider sweep stopped.', 'info');
        return;
      }
      startAutoSweep();
    }

    async function handlePlay() {
      if (isAnimating) return;

      const numText = numberInput.value.trim();
      const ruleText = ruleInput.value.trim();

      if (numText === '' || Number.isNaN(Number(numText))) {
        setStatus('Please enter a valid numeric input value.', 'error');
        return;
      }

      if (ruleText === '') {
        setStatus('Please enter a polynomial transformation rule.', 'error');
        return;
      }

      const inputValue = Number(numText);
      setNumberInputValue(inputValue);
      syncSliderToInputValue();

      if (isAutomaticMode()) {
        applyImmediateTransformation();
        return;
      }

      try {
        movingInput.className = 'moving-box input-token';
        movingOutput.className = 'moving-box output-token';

        const { variableName, displayOutput, substituted } = computeTransformation(ruleText, inputValue);

        await runAnimation(inputValue, ruleText, variableName, displayOutput, substituted);
      } catch (error) {
        setStatus(error.message || 'Could not parse the transformation rule.', 'error');
      }
    }

    playBtn.addEventListener('click', handlePlay);
    resetBtn.addEventListener('click', resetAnimation);
    sliderSweepBtn.addEventListener('click', toggleAutoSweep);
    ruleInput.addEventListener('input', () => {
      if (isAutomaticMode()) {
        applyImmediateTransformation();
      }
    });
    automaticToggle.addEventListener('change', () => {
      if (!isAutomaticMode()) {
        stopAutoSweep();
        setStatus('Automatic mode off. Use Play to run animation.', 'info');
        return;
      }
      applyImmediateTransformation();
    });

    initValueControls();
    resetAnimation();
    applyImmediateTransformation();
  </script>
</body>
</html>
