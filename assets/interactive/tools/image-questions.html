<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Question Authoring Tool</title>
  <style>
    body{font-family:Arial,sans-serif;margin:1rem;background:#f8fafc;color:#0f172a} .panel{max-width:1100px;margin:auto;background:#fff;padding:1rem;border:1px solid #cbd5e1;border-radius:12px}
    .grid{display:grid;grid-template-columns:1fr 280px;gap:1rem} .controls label{display:block;font-weight:700;margin-top:.6rem}
    input,textarea,button{width:100%;padding:.55rem;border:1px solid #94a3b8;border-radius:8px} button{font-weight:700;cursor:pointer;background:#2563eb;color:#fff;border:none;margin-top:.6rem}
    .img-wrap{position:relative;border:1px solid #cbd5e1;border-radius:10px;overflow:hidden} img{width:100%;display:block} canvas{position:absolute;inset:0;width:100%;height:100%;touch-action:none;cursor:crosshair}
    .msg{margin-top:.5rem;font-weight:700}
    .slider-row{margin-top:.5rem}
    .slider-row .label-line{display:flex;justify-content:space-between;align-items:center;font-weight:700;margin-bottom:.25rem}
    .slider-row .value{color:#1d4ed8}
    .help-text{font-size:.85rem;color:#475569;margin-top:.25rem;line-height:1.3}
    .upload-status{margin-top:.35rem;font-size:.85rem;font-weight:700;color:#1e40af}
    .upload-warning{margin-top:.35rem;font-size:.85rem;font-weight:700;color:#b91c1c}.back-to-main-button{display:inline-block;margin:0 auto .75rem;max-width:1100px;background:#0f172a;color:#fff;text-decoration:none;padding:.5rem .8rem;border-radius:8px;font-weight:700}
  </style>
</head>
<body>
<a class="back-to-main-button" href="../index.html">Back to Interactive Main</a>
<div class="panel">
  <h1>Image Question Settings Generator</h1>
  <div class="grid">
    <div>
      <div class="img-wrap"><img id="targetImage" alt="Target" /><canvas id="drawCanvas"></canvas></div>
      <div class="msg" id="message"></div>
    </div>
    <div class="controls">
      <label>Image URL</label><input id="imageUrl" type="text" placeholder="https://..." />
      <button id="loadImageBtn" type="button">Load Image</button>
      <label>Existing database file</label><input id="existingDatabaseFile" type="file" accept=".js" />
      <div class="help-text">Upload an existing image-questions-settings.js file to append the new question to it. The intended save path is /assets/interactive/template/databases/image-questions-settings.js.</div>
      <div class="upload-status" id="uploadStatus"></div>
      <div class="upload-warning" id="uploadWarning"></div>
      <label>Question ID</label><input id="questionId" type="text" placeholder="image-question-1" />
      <label>Question Title</label><input id="questionTitle" type="text" placeholder="Identify the target region" />
      <label>Question Prompt</label><textarea id="questionPrompt">Draw over the requested region in the image.</textarea>
      <div class="slider-row">
        <div class="label-line"><label for="studentInkPercent">Student ink</label><span class="value" id="studentInkValue">150%</span></div>
        <input id="studentInkPercent" type="range" min="100" max="200" value="150" step="1" />
      </div>
      <div class="slider-row">
        <div class="label-line"><label for="coverGoalPercent">Cover goal</label><span class="value" id="coverGoalValue">90%</span></div>
        <input id="coverGoalPercent" type="range" min="30" max="100" value="90" step="1" />
      </div>
      <label>Brush Size</label><input id="brushSize" type="range" min="1" max="8" value="3" />
      <button id="clearBtn" type="button">Clear Drawing</button>
      <button id="downloadBtn" type="button">Download image-questions-settings.js</button>
    </div>
  </div>
</div>
<script>
const GRID_W=100,GRID_H=100;const img=document.getElementById('targetImage');const canvas=document.getElementById('drawCanvas');const ctx=canvas.getContext('2d');const cells=new Set();const msg=document.getElementById('message');let drawing=false;
const studentInkSlider=document.getElementById('studentInkPercent');const coverGoalSlider=document.getElementById('coverGoalPercent');const studentInkValue=document.getElementById('studentInkValue');const coverGoalValue=document.getElementById('coverGoalValue');
const existingDatabaseFileInput=document.getElementById('existingDatabaseFile');const uploadStatus=document.getElementById('uploadStatus');const uploadWarning=document.getElementById('uploadWarning');
let importedImageQuestions=[];
function clampPercent(value,min,max,def){const n=Number(value);if(!Number.isFinite(n))return def;return Math.min(max,Math.max(min,Math.round(n)));}
function updateSliderValues(){studentInkValue.textContent=`${clampPercent(studentInkSlider.value,100,200,150)}%`;coverGoalValue.textContent=`${clampPercent(coverGoalSlider.value,30,100,90)}%`;}
function clearUploadMessages(){uploadStatus.textContent='';uploadWarning.textContent='';}
function resetImportedQuestions(){importedImageQuestions=[];}
function isJavaScriptFile(file){if(!file)return false;return file.name.toLowerCase().endsWith('.js');}
function parseImportedImageQuestions(fileText){
  const assignmentPattern=/window\s*\.\s*InteractiveImageQuestionSettings\s*=/;
  if(!assignmentPattern.test(fileText)){return{ok:false,warning:'Uploaded file does not define window.InteractiveImageQuestionSettings.'};}
  try{
    const fakeWindow={};
    new Function('window',fileText)(fakeWindow);
    const importedSettings=fakeWindow&&fakeWindow.InteractiveImageQuestionSettings;
    if(!importedSettings||!Array.isArray(importedSettings.imageQuestions)){return{ok:false,warning:'Uploaded file is missing a valid imageQuestions array.'};}
    return{ok:true,imageQuestions:importedSettings.imageQuestions};
  }catch(_error){
    return{ok:false,warning:'Uploaded file could not be parsed. Continuing without existing questions.'};
  }
}
function ensureUniqueQuestionId(baseId,existingQuestions){
  const normalizedBase=(baseId||'image-question-1').trim()||'image-question-1';
  const existingIds=new Set(existingQuestions.map(q=>q&&typeof q.id==='string'?q.id:String(q&&q.id||'')));
  if(!existingIds.has(normalizedBase))return normalizedBase;
  let counter=2;
  let candidate=`${normalizedBase}-${counter}`;
  while(existingIds.has(candidate)){counter+=1;candidate=`${normalizedBase}-${counter}`;}
  return candidate;
}
studentInkSlider.addEventListener('input',updateSliderValues);coverGoalSlider.addEventListener('input',updateSliderValues);updateSliderValues();
function sync(){const r=img.getBoundingClientRect();canvas.width=Math.max(1,Math.round(r.width));canvas.height=Math.max(1,Math.round(r.height));redraw();}
function redraw(){ctx.clearRect(0,0,canvas.width,canvas.height);ctx.fillStyle='rgba(37,99,235,.35)';cells.forEach(i=>{const x=i%GRID_W,y=Math.floor(i/GRID_W);ctx.fillRect(x*canvas.width/GRID_W,y*canvas.height/GRID_H,canvas.width/GRID_W,canvas.height/GRID_H);});}
function paint(e){if(!drawing)return;const rect=canvas.getBoundingClientRect();const px=(e.clientX-rect.left)/rect.width*GRID_W;const py=(e.clientY-rect.top)/rect.height*GRID_H;const rad=Number(document.getElementById('brushSize').value);
for(let y=Math.floor(py-rad);y<=Math.ceil(py+rad);y++)for(let x=Math.floor(px-rad);x<=Math.ceil(px+rad);x++){if(x<0||y<0||x>=GRID_W||y>=GRID_H)continue;const dx=x+0.5-px,dy=y+0.5-py;if(dx*dx+dy*dy<=rad*rad)cells.add(y*GRID_W+x);}redraw();}
canvas.addEventListener('pointerdown',e=>{drawing=true;canvas.setPointerCapture(e.pointerId);paint(e);});canvas.addEventListener('pointermove',paint);canvas.addEventListener('pointerup',()=>drawing=false);canvas.addEventListener('pointerleave',()=>drawing=false);
window.addEventListener('resize',sync);
document.getElementById('loadImageBtn').onclick=()=>{const url=document.getElementById('imageUrl').value.trim();if(!url){msg.textContent='Please provide an image URL before loading.';return;}img.src=url;img.onload=()=>{msg.textContent='Image loaded.';sync();};img.onerror=()=>{msg.textContent='Failed to load image.';}};
existingDatabaseFileInput.addEventListener('change',async()=>{
  clearUploadMessages();
  resetImportedQuestions();
  const file=existingDatabaseFileInput.files&&existingDatabaseFileInput.files[0];
  if(!file){return;}
  if(!isJavaScriptFile(file)){existingDatabaseFileInput.value='';uploadWarning.textContent='Please upload a .js file.';return;}
  try{
    const fileText=await file.text();
    const parsed=parseImportedImageQuestions(fileText);
    if(!parsed.ok){uploadWarning.textContent=parsed.warning;return;}
    importedImageQuestions=parsed.imageQuestions;
    uploadStatus.textContent=`Loaded ${file.name} (${importedImageQuestions.length} existing image question${importedImageQuestions.length===1?'':'s'} detected).`;
  }catch(_error){
    existingDatabaseFileInput.value='';
    uploadWarning.textContent='Failed to read uploaded file. Continuing without existing questions.';
  }
});
document.getElementById('clearBtn').onclick=()=>{cells.clear();redraw();};
document.getElementById('downloadBtn').onclick=()=>{const imageUrl=document.getElementById('imageUrl').value.trim();if(!imageUrl){msg.textContent='Please provide an image URL.';return;}if(!cells.size){msg.textContent='Draw at least one region before download.';return;}const requestedId=(document.getElementById('questionId').value.trim()||'image-question-1');const title=(document.getElementById('questionTitle').value.trim()||'Identify the target region');const prompt=(document.getElementById('questionPrompt').value.trim()||'Draw over the requested region in the image.');const filledCells=[...cells].sort((a,b)=>a-b);
const studentInkPercent=clampPercent(studentInkSlider.value,100,200,150);const coverGoalPercent=clampPercent(coverGoalSlider.value,30,100,90);
const existingQuestions=Array.isArray(importedImageQuestions)?importedImageQuestions:[];
const uniqueId=ensureUniqueQuestionId(requestedId,existingQuestions);
const newQuestion={id:uniqueId,title,prompt,imageUrl,studentInkPercent,coverGoalPercent,goalRegion:{type:'normalized-mask',width:100,height:100,filledCells}};
const mergedQuestions=[...existingQuestions,newQuestion];
const js=`window.InteractiveImageQuestionSettings = ${JSON.stringify({imageQuestions:mergedQuestions},null,2)};\n`;
const blob=new Blob([js],{type:'application/javascript'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='image-questions-settings.js';a.click();URL.revokeObjectURL(a.href);msg.textContent='Downloaded image-questions-settings.js';};
</script>
</body></html>
