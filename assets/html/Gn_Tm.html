<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grade N - Term M</title>
  <link rel="stylesheet" href="../../assets/css/base.css">
  <link rel="stylesheet" href="../../assets/css/components.css">
  <link rel="stylesheet" href="../../assets/css/theme.css">
  <link rel="stylesheet" href="../../assets/css/youtube-links.css">
  <style>
    .temporary-links{display:flex;flex-direction:column;gap:.75rem}
    .temporary-link-row{display:grid;grid-template-columns:minmax(10rem,14rem) 1fr;align-items:center;gap:1rem}
    .temporary-link-label{font-weight:600}
    .temporary-link-button{display:inline-flex;align-items:center;justify-content:center;width:fit-content}
    @media (max-width:640px){.temporary-link-row{grid-template-columns:1fr}.temporary-link-button{width:100%}}
  </style>
</head>
<body class="theme-grade10">
  <header class="site-header">
    <a href="#" class="page-link">&larr; Back</a>
    <h1>Grade N - Term M</h1>
    <p>Description</p>
  </header>

  <main class="term-layout">
    <section id="temporary-notice" class="content-card collapsible">
      <h2>
        <button class="collapse-toggle" type="button" id="temporary-notice-toggle" aria-expanded="true" aria-controls="temporary-notice-content">
          <span class="toggle-label">Notice</span>
          <span class="toggle-icon" aria-hidden="true">−</span>
        </button>
      </h2>
      <div class="collapsible-content" id="temporary-notice-content" role="region" aria-labelledby="temporary-notice-toggle">
        <div class="temporary-links">
          <div class="temporary-link-row">
            <span class="temporary-link-label">Link 1</span>
            <a href="#" class="page-link temporary-link-button">Open</a>
          </div>
          <div class="temporary-link-row">
            <span class="temporary-link-label">Link 2</span>
            <a href="#" class="page-link temporary-link-button">Open</a>
          </div>
        </div>
      </div>
    </section>

    <section id="table-of-contents" class="content-card collapsible">
      <h2>
        <button class="collapse-toggle" type="button" id="table-of-contents-toggle" aria-expanded="true" aria-controls="table-of-contents-content">
          <span class="toggle-label">Table of Contents</span>
          <span class="toggle-icon" aria-hidden="true">−</span>
        </button>
      </h2>
      <div class="collapsible-content" id="table-of-contents-content" role="region" aria-labelledby="table-of-contents-toggle">
        <ul>
          <li><a href="#general-information">General Information</a></li>
          <li><a href="#first-learning-evidence">First Learning Evidence</a></li>
          <li><a href="#second-learning-evidence">Second Learning Evidence</a></li>
          <li><a href="#third-learning-evidence">Third Learning Evidence</a></li>
        </ul>
      </div>
    </section>

    <section id="general-information" class="content-card collapsible">
      <h2><button class="collapse-toggle" type="button" aria-expanded="false"><span class="toggle-label">General</span><span class="toggle-icon" aria-hidden="true">+</span></button></h2>
      <div class="collapsible-content">
        <ul>
          <li>Practice</li>
          <li>Support</li>
        </ul>
        <section id="extra-resources" class="subsection-minimize">
          <button class="subsection-toggle" type="button" aria-expanded="false"><span class="toggle-label">Extra Resources</span><span class="toggle-icon" aria-hidden="true">+</span></button>
          <div class="subsection-content">
            <ul>
              <li><a href="#" class="page-link">Page</a></li>
              <li><a href="https://www.youtube.com/" class="video-link" target="_blank" rel="noopener noreferrer">Video</a></li>
              <li><a href="#" class="pdf-link">PDF</a></li>
            </ul>
          </div>
        </section>
      </div>
    </section>

    <section id="first-learning-evidence" class="content-card collapsible">
      <h2>
        <button class="collapse-toggle" type="button" id="first-learning-evidence-toggle" aria-expanded="false" aria-controls="first-learning-evidence-content">
          <span class="toggle-label">First Learning Evidence</span>
          <span class="toggle-icon" aria-hidden="true">+</span>
        </button>

      <div class="collapsible-content" id="first-learning-evidence-content" role="region" aria-labelledby="first-learning-evidence-toggle">

        <section class="subsection-minimize">
          <button class="subsection-toggle" type="button" aria-expanded="false">
            <span class="toggle-label">Activity</span>
            <span class="toggle-icon" aria-hidden="true">+</span>
          </button>
          <div class="subsection-content">
            <p><a href="#" class="page-link">Open</a></p>
          </div>
        </section>
      </div>
    </section>

    <section id="second-learning-evidence" class="content-card collapsible">
      <h2>

          </button>
          <div class="subsection-content">
            <p><a href="#" class="page-link">Open</a></p>
          </div>
        </section>
      </div>
    </section>

    <section id="third-learning-evidence" class="content-card collapsible">
      <h2>
        <button class="collapse-toggle" type="button" id="third-learning-evidence-toggle" aria-expanded="false" aria-controls="third-learning-evidence-content">
          <span class="toggle-label">Third Learning Evidence</span>
          <span class="toggle-icon" aria-hidden="true">+</span>

      <div class="collapsible-content" id="third-learning-evidence-content" role="region" aria-labelledby="third-learning-evidence-toggle">

          <button class="subsection-toggle" type="button" aria-expanded="false">
            <span class="toggle-label">Activity</span>
            <span class="toggle-icon" aria-hidden="true">+</span>
          </button>
          <div class="subsection-content">
            <p><a href="#" class="page-link">Open</a></p>
          </div>
        </section>
      </div>
    </section>
  </main>

  <script src="../../assets/js/collapsible.js"></script>

</html>
